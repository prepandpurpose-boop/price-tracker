<style>
:root{--green:#2d5016;--green-mid:#4a7c28;--green-bright:#2a8020;--green-light:#e8f0e0;--cream:#faf8f3;--white:#fffef9;--text:#1a1a1a;--text-muted:#6b6b6b;--text-hint:#999;--border:#e5e2db;--red:#c44;--red-light:#fef0f0;--yellow:#b8860b;--yellow-light:#fdf8ed;--radius:12px;--shadow:0 1px 3px rgba(0,0,0,.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased}
input,select,button,textarea{font-family:inherit}
button{cursor:pointer}
.app{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;background:var(--cream);position:relative}
.hdr{background:var(--green);color:white;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.hdr-title{font-size:17px;font-weight:800;letter-spacing:-.01em}
.hdr-sub{font-size:10px;opacity:.65;margin-top:1px;font-weight:500}
.hdr-btn{background:white;color:var(--green);border:none;border-radius:8px;padding:8px 14px;font-weight:700;font-size:12px}
.hdr-back{background:none;border:none;color:white;font-size:14px;font-weight:600;padding:4px 8px}
.cnt{padding:0 16px 120px}
.card{background:white;border-radius:var(--radius);border:1px solid var(--border);padding:14px 16px;margin-bottom:8px;box-shadow:var(--shadow)}
.card-buy{border-color:rgba(42,128,32,.2)}
.card-pass{border-color:rgba(204,68,68,.15)}
.sig{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase}
.sig-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.sig-buy{color:var(--green-bright)}.sig-buy .sig-dot{background:var(--green-bright)}
.sig-norm{color:var(--yellow)}.sig-norm .sig-dot{background:var(--yellow)}
.sig-pass{color:var(--red)}.sig-pass .sig-dot{background:var(--red)}
.inp{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:white}
.inp:focus{outline:none;border-color:var(--green-mid);box-shadow:0 0 0 2px rgba(45,80,22,.12)}
.inp-lg{font-size:20px;font-weight:700;padding:14px;text-align:center}
.lbl{display:block;font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.req{color:var(--red)}
.row{display:flex;gap:8px}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:700}
.btn-primary{background:var(--green);color:white}
.btn-outline{background:white;color:var(--green);border:1px solid var(--green)}
.btn-sm{padding:8px 14px;font-size:12px;width:auto;border-radius:8px}
.btn-danger{background:white;color:var(--red);border:1px solid var(--red);font-size:13px;padding:10px}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:200}
.modal-sheet{background:white;border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%;max-width:480px}
.modal-title{font-size:17px;font-weight:800;margin-bottom:16px}
.store-btn{width:100%;padding:16px;background:white;border:1px solid var(--border);border-radius:var(--radius);font-size:16px;font-weight:700;text-align:left;margin-bottom:8px;display:flex;align-items:center;gap:12px;transition:all .15s}
.store-btn:hover,.store-btn:active{border-color:var(--green);background:var(--green-light)}
.store-btn-add{border-style:dashed;color:var(--green);font-weight:600}
.chip{display:inline-flex;padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:white;font-size:11px;font-weight:600;white-space:nowrap;cursor:pointer}
.chip.active{background:var(--green);border-color:var(--green);color:white}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:white;border-top:1px solid var(--border);display:flex;z-index:50;padding:6px 0 max(6px,env(safe-area-inset-bottom))}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;background:none;border:none;font-size:10px;font-weight:600;color:var(--text-muted)}
.nav-btn.active{color:var(--green)}
.nav-i{font-size:20px}
.empty{text-align:center;padding:40px 20px;color:var(--text-muted)}
.alert{border-radius:var(--radius);padding:12px 14px;margin-bottom:12px;font-size:13px;line-height:1.5}
.logo{width:36px;height:36px;border-radius:8px;object-fit:contain}
.logo-lg{width:80px;height:80px;border-radius:16px;object-fit:contain;margin-bottom:16px}
.result-card{border-radius:14px;padding:20px;margin:16px 0;text-align:center}
.result-buy{background:var(--green-light);border:1px solid rgba(42,128,32,.2)}
.result-norm{background:var(--yellow-light);border:1px solid rgba(184,134,11,.15)}
.result-pass{background:var(--red-light);border:1px solid rgba(204,68,68,.15)}
.home-prompt{background:var(--green);color:white;border-radius:14px;padding:20px;margin:12px 0;text-align:center}
@media(max-width:400px){.cnt{padding:0 12px 120px}.hdr{padding:12px 14px}}
</style>
</head>

const sb={
  headers:()=>({'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+(A.token||SB_KEY)}),
  async rpc(table,method,body,query=''){
    const url=`${SB_URL}/rest/v1/${table}${query}`;
    const r=await fetch(url,{method,headers:{...sb.headers(),...(method==='GET'?{}:{'Prefer':'return=representation'})},body:body?JSON.stringify(body):undefined});
    if(!r.ok)throw new Error(await r.text());
    const text=await r.text();return text?JSON.parse(text):null;
  },
  async auth(action,email,password){
    const r=await fetch(`${SB_URL}/auth/v1/${action}`,{method:'POST',headers:{'Content-Type':'application/json','apikey':SB_KEY},body:JSON.stringify({email,password})});return r.json();
  }
};

async function doSignup(){const e=document.getElementById('auth-email')?.value?.trim(),p=document.getElementById('auth-pass')?.value;if(!e||!p)return toast('Enter email and password');if(p.length<6)return toast('Password must be 6+ characters');try{const r=await sb.auth('signup',e,p);if(r.error)return toast(r.error.message);if(r.access_token){A.user=r.user;A.token=r.access_token;localStorage.setItem('pt_token',r.access_token);localStorage.setItem('pt_user',JSON.stringify(r.user));A.page='store_select';await loadData();render();}else toast('Check email to confirm, then log in.');}catch(x){toast('Signup failed');}}
async function doLogin(){const e=document.getElementById('auth-email')?.value?.trim(),p=document.getElementById('auth-pass')?.value;if(!e||!p)return toast('Enter email and password');try{const r=await sb.auth('token?grant_type=password',e,p);if(r.error)return toast(r.error.message);if(r.access_token){A.user=r.user;A.token=r.access_token;localStorage.setItem('pt_token',r.access_token);localStorage.setItem('pt_refresh',r.refresh_token);localStorage.setItem('pt_user',JSON.stringify(r.user));A.page='store_select';await loadData();render();}}catch(x){toast('Login failed');}}
function doLogout(){A.user=null;A.token=null;A.items=[];A.logs={};A.activeStore=null;localStorage.removeItem('pt_token');localStorage.removeItem('pt_refresh');localStorage.removeItem('pt_user');A.page='landing';render();}
async function tryAutoLogin(){const t=localStorage.getItem('pt_token'),u=localStorage.getItem('pt_user');if(t&&u){A.token=t;A.user=JSON.parse(u);A.page='store_select';try{await loadData();}catch(e){loadLocal();}render();}else render();}

// DATA
async function loadData(){try{const items=await sb.rpc('price_tracker_items','GET',null,`?user_id=eq.${A.user.id}&order=name.asc`);A.items=items||[];if(A.items.length>0){const ids=A.items.map(i=>i.id).join(',');const logs=await sb.rpc('price_tracker_logs','GET',null,`?item_id=in.(${ids})&order=logged_date.desc`);A.logs={};(logs||[]).forEach(l=>{if(!A.logs[l.item_id])A.logs[l.item_id]=[];A.logs[l.item_id].push(l);});}syncPending();saveLocal();}catch(e){loadLocal();}}
function saveLocal(){localStorage.setItem('pt_items',JSON.stringify(A.items));localStorage.setItem('pt_logs',JSON.stringify(A.logs));}
function loadLocal(){try{A.items=JSON.parse(localStorage.getItem('pt_items')||'[]');A.logs=JSON.parse(localStorage.getItem('pt_logs')||'{}');}catch(e){}}
async function addItem(name,cat,unit,bp){const item={user_id:A.user.id,name,category:cat,unit,buy_price:parseFloat(bp)};try{const r=await sb.rpc('price_tracker_items','POST',item);if(r&&r[0]){A.items.push(r[0]);A.logs[r[0].id]=[];saveLocal();render();toast(name+' added');return r[0];}}catch(e){toast('Failed to add');}return null;}
async function deleteItem(id){try{await sb.rpc('price_tracker_logs','DELETE',null,`?item_id=eq.${id}`);await sb.rpc('price_tracker_items','DELETE',null,`?id=eq.${id}`);A.items=A.items.filter(i=>i.id!==id);delete A.logs[id];saveLocal();A.page=A.activeStore?'shopping':'items';A.selectedItem=null;render();toast('Deleted');}catch(e){toast('Failed');}}
async function addLog(itemId,totalPrice,store,pkgSize,date){store=normStore(store);if(!store)return toast('Pick a store first');if(!totalPrice||parseFloat(totalPrice)<=0)return toast('Enter the price');const pkg=parseFloat(pkgSize)||1;const perUnit=+(parseFloat(totalPrice)/pkg).toFixed(2);const log={item_id:itemId,user_id:A.user.id,price:perUnit,store,qty:pkg,package_size:pkg,logged_date:date||new Date().toISOString().split('T')[0]};try{const r=await sb.rpc('price_tracker_logs','POST',log);if(r&&r[0]){if(!A.logs[itemId])A.logs[itemId]=[];A.logs[itemId].unshift(r[0]);saveLocal();showResult(itemId,r[0]);return;}toast('Try again');}catch(e){log._pending=true;log.id='p_'+Date.now();if(!A.logs[itemId])A.logs[itemId]=[];A.logs[itemId].unshift(log);A._pendingLogs.push({...log});localStorage.setItem('pt_pending',JSON.stringify(A._pendingLogs));saveLocal();showResult(itemId,log);toast('Saved offline — will sync later');}}
async function syncPending(){const p=JSON.parse(localStorage.getItem('pt_pending')||'[]');if(!p.length)return;const done=[];for(const l of p){try{const c={...l};delete c._pending;delete c.id;await sb.rpc('price_tracker_logs','POST',c);done.push(l.id);}catch(e){}}if(done.length){localStorage.setItem('pt_pending',JSON.stringify(p.filter(x=>!done.includes(x.id))));await loadData();}}
async function deleteLog(itemId,logId){try{await sb.rpc('price_tracker_logs','DELETE',null,`?id=eq.${logId}`);A.logs[itemId]=(A.logs[itemId]||[]).filter(l=>l.id!==logId);saveLocal();render();toast('Deleted');}catch(e){toast('Failed');}}
async function updateBuyPrice(id,p){try{await sb.rpc('price_tracker_items','PATCH',{buy_price:parseFloat(p)},`?id=eq.${id}`);const it=A.items.find(i=>i.id===id);if(it)it.buy_price=parseFloat(p);saveLocal();render();toast('Updated');}catch(e){toast('Failed');}}

// HELPERS
function normStore(s){if(!s||!s.trim())return'';return s.trim().split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()).join(' ');}
function getStores(){const s=new Set();Object.values(A.logs).forEach(logs=>logs.forEach(l=>s.add(l.store)));return[...s].sort();}
function getSignal(pu,bp){if(pu<=bp)return'buy';if(pu<=bp*1.15)return'norm';return'pass';}
function getBest(id){const l=A.logs[id]||[];if(!l.length)return null;return l.reduce((b,x)=>parseFloat(x.price)<parseFloat(b.price)?x:b,l[0]);}
function getLastAt(id,store){return(A.logs[id]||[]).filter(l=>l.store===store).sort((a,b)=>new Date(b.logged_date)-new Date(a.logged_date))[0]||null;}
function fmtD(d){if(!d)return'';return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function showResult(id,log){A._logResult={itemId:id,log};A.modal='result';render();}
function openLog(){if(!A.selectedItem&&A.items.length>0)A.selectedItem=A.items[0];A.modal='logPrice';render();}
async function addAndLog(n,c,u,bp){const it=await addItem(n,c,u,bp);if(it){A.selectedItem=it;openLog();}}
let _tt;function toast(m){let e=document.getElementById('toast');if(!e){e=document.createElement('div');e.id='toast';e.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--green);color:white;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;max-width:340px;text-align:center';document.body.appendChild(e);}e.textContent=m;e.style.opacity='1';clearTimeout(_tt);_tt=setTimeout(()=>e.style.opacity='0',2500);}

// RENDER
function render(){
  const app=document.getElementById('app');
  let html='';
  if(A.page==='landing'){app.innerHTML=rLanding();return;}
  if(A.page==='store_select')html=rHdr('main')+rStoreSelect()+rNav();
  else if(A.page==='shopping')html=rHdr('shop')+rShopping()+rNav();
  else if(A.page==='items')html=rHdr('main')+rItems()+rNav();
  else if(A.page==='detail')html=rHdr('detail')+rDetail()+rNav();
  else if(A.page==='stores')html=rHdr('main')+rStoresView()+rNav();
  else if(A.page==='insights')html=rHdr('main')+rInsights()+rNav();
  app.innerHTML=html;
  if(A.modal){const d=document.createElement('div');d.innerHTML=rModal();if(d.firstElementChild)app.appendChild(d.firstElementChild);}
}

function rHdr(mode){
  if(mode==='shop')return`<div class="hdr"><div><div class="hdr-title">🏪 ${A.activeStore}</div><div class="hdr-sub">Tap items to log prices</div></div><button class="hdr-btn" onclick="A.activeStore=null;A.page='store_select';render()">Switch</button></div>`;
  if(mode==='detail')return`<div class="hdr"><button class="hdr-back" onclick="A.page=A.activeStore?'shopping':'items';A.selectedItem=null;render()">← Back</button><button class="hdr-btn" onclick="openLog()">+ Log Price</button></div>`;
  return`<div class="hdr"><div style="display:flex;align-items:center;gap:10px"><img src="${LOGO}" class="logo" alt=""><div><div class="hdr-title">Price Tracker</div><div class="hdr-sub">Prep & Purpose</div></div></div></div>`;
}

function rStoreSelect(){
  const stores=getStores();
  let h=`<div class="cnt" style="padding-top:16px">
    <div class="home-prompt"><div style="font-size:22px;margin-bottom:8px">🛒</div><div style="font-size:18px;font-weight:800;margin-bottom:6px">Where are you shopping?</div><div style="font-size:13px;opacity:.85">Pick your store to start logging prices</div></div>`;
  stores.forEach(s=>{
    const ct=A.items.filter(i=>(A.logs[i.id]||[]).some(l=>l.store===s)).length;
    h+=`<button class="store-btn" onclick="A.activeStore='${s}';A.page='shopping';render()"><span style="font-size:22px">🏪</span><div><div style="font-size:15px;font-weight:700">${s}</div><div style="font-size:11px;color:var(--text-muted)">${ct} item${ct!==1?'s':''} tracked</div></div></button>`;
  });
  h+=`<button class="store-btn store-btn-add" onclick="A.modal='addStore';render()"><span style="font-size:22px">➕</span><div>Add New Store</div></button>`;
  if(A.items.length===0)h+=`<div style="margin-top:24px;background:white;border-radius:var(--radius);padding:16px;border:1px solid var(--border)"><div style="font-size:15px;font-weight:800;margin-bottom:8px">Getting Started</div><div style="font-size:13px;color:var(--text-muted);line-height:1.7"><strong>1.</strong> Add a store you shop at<br><strong>2.</strong> Pick that store to start shopping<br><strong>3.</strong> Tap suggested items to add them<br><strong>4.</strong> Enter the shelf price<br><strong>5.</strong> The app tells you: stock up, pass, or go somewhere else</div></div>`;
  h+=`</div>`;return h;
}

function rShopping(){
  const store=A.activeStore;
  let h=`<div class="cnt" style="padding-top:8px">`;
  h+=`<div style="display:flex;gap:6px;padding:4px 0 10px;overflow-x:auto">`;
  ['All',...CATEGORIES].forEach(c=>{h+=`<button class="chip ${A.filter===c?'active':''}" onclick="A.filter='${c}';render()">${c}</button>`;});
  h+=`</div>`;
  const filtered=A.items.filter(i=>(A.filter==='All'||i.category===A.filter));
  filtered.sort((a,b)=>a.name.localeCompare(b.name));
  filtered.forEach(item=>{
    const bp=parseFloat(item.buy_price);
    const last=getLastAt(item.id,store);
    const best=getBest(item.id);
    const lp=last?parseFloat(last.price):null;
    const sig=lp?getSignal(lp,bp):null;
    const bestP=best?parseFloat(best.price):null;
    const better=best&&bestP&&lp&&best.store!==store&&bestP<lp;
    const cls=sig==='buy'?'card card-buy':sig==='pass'?'card card-pass':'card';
    h+=`<div class="${cls}" style="cursor:pointer" onclick="A.selectedItem=A.items.find(i=>i.id==='${item.id}');openLog()">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div style="flex:1;min-width:0">
          <div style="font-size:15px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${item.name}</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:2px">Buy under $${bp.toFixed(2)}/${item.unit}</div>
          ${better?`<div style="font-size:11px;color:var(--green-bright);font-weight:600;margin-top:3px">💡 $${bestP.toFixed(2)} at ${best.store}</div>`:''}
        </div>
        <div style="text-align:right;margin-left:12px;flex-shrink:0">
          ${lp?`<div style="font-size:18px;font-weight:800;color:${sig==='buy'?'var(--green-bright)':sig==='pass'?'var(--red)':'var(--text)'}">$${lp.toFixed(2)}</div>
            <div class="sig sig-${sig}"><span class="sig-dot"></span>${sig==='buy'?'STOCK UP':sig==='pass'?'PASS':'NORMAL'}</div>`
          :`<div style="font-size:12px;color:var(--green);font-weight:600">Tap to log</div>`}
        </div>
      </div>
    </div>`;
  });
  // Suggested items not yet added
  const unadded=STARTER_ITEMS.filter(s=>(A.filter==='All'||s.category===A.filter)&&!A.items.find(i=>i.name.toLowerCase()===s.name.toLowerCase()));
  if(unadded.length>0){
    h+=`<div style="font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;margin:16px 0 8px">Suggested — Tap to Add & Log</div>`;
    unadded.forEach(s=>{
      h+=`<div class="card" style="cursor:pointer;padding:12px 14px;border-style:dashed" onclick="addAndLog('${s.name}','${s.category}','${s.unit}',${s.buy_price})">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div><div style="font-size:14px;font-weight:600">${s.name}</div><div style="font-size:11px;color:var(--text-muted)">${s.tip}</div></div>
          <div style="font-size:12px;font-weight:700;color:var(--green);flex-shrink:0;margin-left:8px">$${s.buy_price.toFixed(2)}/${s.unit}</div>
        </div>
      </div>`;
    });
  }
  h+=`<div style="text-align:center;padding:16px"><button class="btn btn-outline btn-sm" onclick="A.modal='addItem';render()">+ Custom Item</button></div></div>`;
  return h;
}

function rItems(){
  let h=`<div class="cnt" style="padding-top:12px">
    <div style="font-size:18px;font-weight:800;margin-bottom:4px">My Items</div>
    <div style="font-size:13px;color:var(--text-muted);margin-bottom:12px">${A.items.length} item${A.items.length!==1?'s':''} tracked</div>
    <input class="inp" placeholder="Search..." value="${A.search}" oninput="A.search=this.value;render()" style="margin-bottom:12px">`;
  const f=A.items.filter(i=>!A.search||i.name.toLowerCase().includes(A.search.toLowerCase())).sort((a,b)=>a.name.localeCompare(b.name));
  f.forEach(item=>{
    const bp=parseFloat(item.buy_price);const best=getBest(item.id);
    h+=`<div class="card" style="cursor:pointer;padding:12px 14px" onclick="A.selectedItem=A.items.find(i=>i.id==='${item.id}');A.page='detail';render()">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:14px;font-weight:700">${item.name}</div>
        <div style="font-size:11px;color:var(--text-muted)">${item.category} · $${bp.toFixed(2)}/${item.unit}${best?' · Best: $'+parseFloat(best.price).toFixed(2)+' at '+best.store:''}</div></div>
        <div style="color:var(--text-muted)">▶</div>
      </div>
    </div>`;
  });
  const un=STARTER_ITEMS.filter(s=>!A.items.find(i=>i.name.toLowerCase()===s.name.toLowerCase()));
  if(un.length>0){
    h+=`<div style="font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin:20px 0 8px">Suggested Items</div>`;
    un.forEach(s=>{h+=`<div class="card" style="cursor:pointer;padding:10px 14px;border-style:dashed" onclick="addItem('${s.name}','${s.category}','${s.unit}',${s.buy_price})"><div style="display:flex;justify-content:space-between"><div style="font-size:13px;font-weight:600">${s.name}</div><div style="font-size:12px;font-weight:700;color:var(--green)">$${s.buy_price.toFixed(2)}/${s.unit}</div></div></div>`;});
  }
  h+=`<div style="text-align:center;padding:16px"><button class="btn btn-outline btn-sm" onclick="A.modal='addItem';render()">+ Custom Item</button></div></div>`;
  return h;
}

function rDetail(){
  const item=A.selectedItem;if(!item)return'';
  const bp=parseFloat(item.buy_price),logs=(A.logs[item.id]||[]).sort((a,b)=>new Date(b.logged_date)-new Date(a.logged_date)),best=getBest(item.id);
  let h=`<div class="cnt" style="padding-top:16px">
    <div style="font-size:20px;font-weight:800">${item.name}</div>
    <div style="font-size:12px;color:var(--text-muted);margin-top:4px">${item.category} · per ${item.unit} · buy under $${bp.toFixed(2)}</div>
    ${best?`<div style="font-size:13px;color:var(--green-bright);font-weight:600;margin-top:6px">Best: $${parseFloat(best.price).toFixed(2)}/${item.unit} at ${best.store} (${fmtD(best.logged_date)})</div>`:''}
    <div style="display:flex;gap:8px;margin:16px 0">
      <button class="btn btn-outline btn-sm" onclick="A.modal='editItem';render()">Edit Buy Price</button>
      <button class="btn btn-sm" style="background:white;color:var(--red);border:1px solid var(--red)" onclick="if(confirm('Delete ${item.name}?'))deleteItem('${item.id}')">Delete</button>
    </div>
    <div style="font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin-bottom:10px">History (${logs.length})</div>`;
  if(!logs.length)h+=`<div class="empty"><div style="font-size:36px">📝</div><div style="font-size:14px;font-weight:600;margin-top:8px">No prices yet</div></div>`;
  logs.forEach(l=>{
    const sig=getSignal(parseFloat(l.price),bp),pkg=parseFloat(l.package_size||l.qty||1),total=(parseFloat(l.price)*pkg).toFixed(2);
    h+=`<div style="padding:10px 12px;background:white;border-radius:8px;margin-bottom:4px;border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
      <div><div style="font-size:13px;font-weight:600">${l.store}</div><div style="font-size:11px;color:var(--text-muted)">${fmtD(l.logged_date)}${pkg>1?' · '+pkg+' '+item.unit+'s · $'+total+' total':''}</div></div>
      <div style="display:flex;align-items:center;gap:8px">
        <div style="font-size:15px;font-weight:800;color:${sig==='buy'?'var(--green-bright)':sig==='pass'?'var(--red)':'var(--text)'}">$${parseFloat(l.price).toFixed(2)}<span style="font-size:10px;color:var(--text-hint)">/${item.unit}</span></div>
        <button style="background:none;border:none;color:var(--text-hint);font-size:16px;cursor:pointer;padding:4px" onclick="event.stopPropagation();if(confirm('Delete?'))deleteLog('${item.id}','${l.id}')">×</button>
      </div>
    </div>`;
  });
  h+=`</div>`;return h;
}

function rStoresView(){
  const stores=getStores();
  let h=`<div class="cnt" style="padding-top:16px">
    <div style="font-size:18px;font-weight:800;margin-bottom:4px">Your Stores</div>
    <div style="font-size:13px;color:var(--text-muted);margin-bottom:16px">Compare prices across stores</div>`;
  if(!stores.length)h+=`<div class="empty"><div style="font-size:36px">🏪</div><div style="font-size:14px;font-weight:600;margin-top:8px">No stores yet</div><div style="font-size:13px;margin-top:4px">Go to Shop and add your first store</div></div>`;
  stores.forEach(store=>{
    const si=[];
    A.items.forEach(item=>{const ls=(A.logs[item.id]||[]).filter(l=>l.store===store);if(ls.length){const s=[...ls].sort((a,b)=>new Date(b.logged_date)-new Date(a.logged_date));const lp=parseFloat(s[0].price);const best=getBest(item.id);si.push({item,lp,date:s[0].logged_date,bestP:best?parseFloat(best.price):lp,bestS:best?best.store:store});}});
    const exp=A.expandedStore===store;
    h+=`<div class="card" style="cursor:pointer" onclick="A.expandedStore=A.expandedStore==='${store}'?null:'${store}';render()">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:15px;font-weight:700">🏪 ${store}</div><div style="font-size:11px;color:var(--text-muted)">${si.length} item${si.length!==1?'s':''}</div></div>
        <div style="color:var(--text-muted)">${exp?'▼':'▶'}</div>
      </div>
    </div>`;
    if(exp){si.sort((a,b)=>a.item.name.localeCompare(b.item.name));si.forEach(x=>{
      const isBest=x.bestS===store||x.lp<=x.bestP;const sav=(x.lp-x.bestP).toFixed(2);
      h+=`<div style="padding:10px 16px 10px 28px;background:white;border-bottom:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div><div style="font-size:13px;font-weight:600">${x.item.name}</div><div style="font-size:11px;color:var(--text-muted)">${fmtD(x.date)}</div>
            ${!isBest&&parseFloat(sav)>0.05?`<div style="font-size:11px;color:var(--green-bright);font-weight:600">💡 Save $${sav}/${x.item.unit} at ${x.bestS}</div>`:''}</div>
          <div style="font-size:15px;font-weight:800;color:${isBest?'var(--green-bright)':'var(--text)'}">$${x.lp.toFixed(2)}/${x.item.unit}</div>
        </div>
      </div>`;})}
  });
  h+=`</div>`;return h;
}

  let tl=0;Object.values(A.logs).forEach(l=>tl+=l.length);const stores=getStores();
  let h=`<div class="cnt" style="padding-top:16px">
    <div style="font-size:18px;font-weight:800;margin-bottom:16px">More</div>
    <div style="display:flex;gap:8px;margin-bottom:20px">
      <div class="card" style="flex:1;text-align:center"><div style="font-size:10px;color:var(--text-muted);font-weight:600;text-transform:uppercase">Items</div><div style="font-size:22px;font-weight:800;color:var(--green);margin-top:4px">${A.items.length}</div></div>
      <div class="card" style="flex:1;text-align:center"><div style="font-size:10px;color:var(--text-muted);font-weight:600;text-transform:uppercase">Logged</div><div style="font-size:22px;font-weight:800;color:var(--green);margin-top:4px">${tl}</div></div>
      <div class="card" style="flex:1;text-align:center"><div style="font-size:10px;color:var(--text-muted);font-weight:600;text-transform:uppercase">Stores</div><div style="font-size:22px;font-weight:800;color:var(--green);margin-top:4px">${stores.length}</div></div>
    </div>
    <div style="padding:16px;background:white;border-radius:var(--radius);border:1px solid var(--border);margin-bottom:12px">
      <div style="font-size:14px;font-weight:700;margin-bottom:8px">📱 Add to Home Screen</div>
      <div style="font-size:13px;color:var(--text-muted);line-height:1.5"><strong>iPhone:</strong> Tap share → Add to Home Screen<br><strong>Android:</strong> Tap menu → Add to Home Screen</div>
    </div>
    <button class="btn btn-outline" style="color:var(--red);border-color:var(--red)" onclick="if(confirm('Sign out?'))doLogout()">Sign Out</button>
  </div>`;return h;
}

function rNav(){
  return`<div class="nav">
    <button class="nav-btn ${A.page==='store_select'||A.page==='shopping'?'active':''}" onclick="A.page=A.activeStore?'shopping':'store_select';render()"><span class="nav-i">🛒</span>Shop</button>
    <button class="nav-btn ${A.page==='items'||A.page==='detail'?'active':''}" onclick="A.page='items';A.selectedItem=null;render()"><span class="nav-i">📋</span>Items</button>
    <button class="nav-btn ${A.page==='stores'?'active':''}" onclick="A.page='stores';render()"><span class="nav-i">🏪</span>Stores</button>
    <button class="nav-btn ${A.page==='insights'?'active':''}" onclick="A.page='insights';render()"><span class="nav-i">⚙️</span>More</button>
  </div>`;
}

function rModal(){
  if(A.modal==='addStore')return`<div class="modal-overlay" onclick="A.modal=null;render()"><div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-title">Add New Store</div>
    <div class="lbl">Store Name</div>
    <input class="inp" id="m-sn" placeholder="e.g. Harris Teeter, Aldi, Walmart" style="margin-bottom:16px">
    <button class="btn btn-primary" onclick="const n=normStore(document.getElementById('m-sn').value);if(!n)return toast('Enter a name');A.activeStore=n;A.page='shopping';A.modal=null;render();toast(n+' added')">Add & Start Shopping</button>
  </div></div>`;

  if(A.modal==='addItem')return`<div class="modal-overlay" onclick="A.modal=null;render()"><div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-title">Add Custom Item</div>
    <div class="lbl">Item Name</div>
    <input class="inp" id="m-n" placeholder="e.g. Pork Butt" style="margin-bottom:10px">
    <div class="row" style="margin-bottom:10px">
      <div style="flex:1"><div class="lbl">Category</div><select class="inp" id="m-c">${CATEGORIES.map(c=>'<option>'+c+'</option>').join('')}</select></div>
      <div style="width:90px"><div class="lbl">Unit</div><select class="inp" id="m-u">${UNITS.map(u=>'<option>'+u+'</option>').join('')}</select></div>
    </div>
    <div class="lbl">Buy Price (stock up below this)</div>
    <input class="inp" id="m-bp" type="number" step="0.01" placeholder="1.99" style="margin-bottom:16px">
    <button class="btn btn-primary" onclick="addItem(document.getElementById('m-n').value,document.getElementById('m-c').value,document.getElementById('m-u').value,document.getElementById('m-bp').value);A.modal=null;">Add Item</button>
  </div></div>`;

  if(A.modal==='logPrice'&&A.selectedItem){
    const item=A.selectedItem,stores=getStores(),best=getBest(item.id),store=A.activeStore;
    let m=`<div class="modal-overlay" onclick="A.modal=null;render()"><div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-title">${item.name}</div>
      ${best?`<div style="background:var(--green-light);border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:12px;line-height:1.5"><strong>Best price:</strong> $${parseFloat(best.price).toFixed(2)}/${item.unit} at ${best.store} (${fmtD(best.logged_date)})</div>`:''}`;
    if(!store){
      m+=`<div class="lbl">1. Store <span class="req">*</span></div>`;
      if(stores.length>0){
        m+=`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">`;
        stores.forEach(s=>{m+=`<button class="chip ${A._logStore===s?'active':''}" onclick="A._logStore='${s}';render()">${s}</button>`;});
        m+=`<button class="chip" style="border-style:dashed" onclick="A._logStore='_new';render()">+ New</button></div>`;
        if(A._logStore==='_new')m+=`<input class="inp" id="m-ns" placeholder="Store name" style="margin-bottom:10px">`;
      }else{m+=`<input class="inp" id="m-ns" placeholder="e.g. Harris Teeter" style="margin-bottom:10px">`;}
    }
    m+=`<div class="lbl">${store?'1':'2'}. Shelf price <span class="req">*</span></div>
      <input class="inp inp-lg" id="m-p" type="number" step="0.01" placeholder="$0.00" inputmode="decimal" style="margin-bottom:10px">
      <div class="lbl">${store?'2':'3'}. Pack size (${item.unit}s in this package)</div>
      <input class="inp" id="m-pk" type="number" step="0.01" value="1" style="margin-bottom:4px">
      <div style="font-size:11px;color:var(--text-hint);margin-bottom:12px">Meat = weight in ${item.unit}s · Packs = count (12 rolls, etc.)</div>
      <button class="btn btn-primary" onclick="
        const s='${store||''}'||A._logStore||(document.getElementById('m-ns')?document.getElementById('m-ns').value:'');
        addLog('${item.id}',document.getElementById('m-p').value,s,document.getElementById('m-pk').value);
        A._logStore=null;A.modal=null;
      ">Log Price</button>
    </div></div>`;
    return m;
  }

  if(A.modal==='result'&&A._logResult){
    const r=A._logResult,item=A.items.find(i=>i.id===r.itemId);
    if(!item){A.modal=null;return'';}
    const bp=parseFloat(item.buy_price),pu=parseFloat(r.log.price),sig=getSignal(pu,bp);
    const best=getBest(item.id),better=best&&best.store!==r.log.store&&parseFloat(best.price)<pu;
    const pkg=parseFloat(r.log.package_size||r.log.qty||1);
    return`<div class="modal-overlay" onclick="A.modal=null;A._logResult=null;render()"><div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="result-card ${sig==='buy'?'result-buy':sig==='pass'?'result-pass':'result-norm'}">
        <div style="font-size:36px;margin-bottom:8px">${sig==='buy'?'🟢':sig==='pass'?'🔴':'🟡'}</div>
        <div style="font-size:22px;font-weight:800">${sig==='buy'?'STOCK UP':sig==='pass'?'PASS':'NORMAL PRICE'}</div>
        <div style="font-size:28px;font-weight:800;margin:8px 0">$${pu.toFixed(2)}<span style="font-size:14px;font-weight:500;color:var(--text-muted)">/${item.unit}</span></div>
        <div style="font-size:13px;color:var(--text-muted)">${item.name} at ${r.log.store}</div>
        ${pkg>1?`<div style="font-size:12px;color:var(--text-muted);margin-top:4px">$${(pu*pkg).toFixed(2)} total for ${pkg} ${item.unit}s</div>`:''}
      </div>
      ${sig==='buy'?`<div style="font-size:14px;font-weight:600;text-align:center;color:var(--green-bright);margin-bottom:12px">At or below your buy price of $${bp.toFixed(2)} — grab extra!</div>`:''}
      ${sig==='pass'?`<div style="font-size:14px;font-weight:600;text-align:center;color:var(--red);margin-bottom:12px">Above your buy price of $${bp.toFixed(2)} — skip if you can.</div>`:''}
      ${better?`<div style="background:var(--green-light);border-radius:10px;padding:12px;text-align:center;margin-bottom:12px;font-size:13px"><strong>💡 $${parseFloat(best.price).toFixed(2)}/${item.unit} at ${best.store}</strong><br>$${(pu-parseFloat(best.price)).toFixed(2)}/${item.unit} cheaper</div>`:''}
      <button class="btn btn-primary" onclick="A.modal=null;A._logResult=null;render()">Done</button>
    </div></div>`;
  }

  if(A.modal==='editItem'&&A.selectedItem){
    const item=A.selectedItem;
    return`<div class="modal-overlay" onclick="A.modal=null;render()"><div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-title">Edit Buy Price</div>
      <div style="font-size:14px;font-weight:600;margin-bottom:12px">${item.name}</div>
      <div class="lbl">Buy Price (stock up below this)</div>
      <input class="inp" id="m-eb" type="number" step="0.01" value="${parseFloat(item.buy_price).toFixed(2)}" style="margin-bottom:16px">
      <button class="btn btn-primary" onclick="updateBuyPrice('${item.id}',document.getElementById('m-eb').value);A.modal=null;A.selectedItem=A.items.find(i=>i.id==='${item.id}');">Update</button>
    </div></div>`;
  }
  return'';
}

tryAutoLogin();
</script></body></html>
