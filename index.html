<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Price Tracker">
<title>Price Tracker — Prep & Purpose</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--green:#2d5016;--green-mid:#4a7c28;--green-bright:#2a8020;--green-light:#e8f0e0;--cream:#faf8f3;--text:#1a1a1a;--text-muted:#6b6b6b;--text-hint:#999;--border:#e5e2db;--red:#c44;--red-light:#fef0f0;--yellow:#b8860b;--yellow-light:#fdf8ed;--radius:12px;--shadow:0 1px 3px rgba(0,0,0,.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
input,select,button{font-family:inherit}
button{cursor:pointer}
.app{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;background:var(--cream);overflow-x:hidden}
.hdr{background:var(--green);color:white;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.hdr-title{font-size:17px;font-weight:800}
.hdr-sub{font-size:10px;opacity:.65;margin-top:1px;font-weight:500}
.hdr-btn{background:white;color:var(--green);border:none;border-radius:8px;padding:8px 14px;font-weight:700;font-size:12px}
.hdr-back{background:none;border:none;color:white;font-size:14px;font-weight:600;padding:4px 8px}
.cnt{padding:0 16px 110px}
.card{background:white;border-radius:var(--radius);border:1px solid var(--border);padding:14px 16px;margin-bottom:8px;box-shadow:var(--shadow)}
.card-buy{border-color:rgba(42,128,32,.2)}
.card-pass{border-color:rgba(204,68,68,.15)}
.inp{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:white}
.inp:focus{outline:none;border-color:var(--green-mid);box-shadow:0 0 0 2px rgba(45,80,22,.12)}
.lbl{display:block;font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:700}
.btn-primary{background:var(--green);color:white}
.btn-outline{background:white;color:var(--green);border:1px solid var(--green)}
.btn-sm{padding:8px 14px;font-size:12px;width:auto;border-radius:8px}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:200}
.modal-sheet{background:white;border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%;max-width:480px}
.modal-title{font-size:17px;font-weight:800;margin-bottom:16px}
.store-btn{width:100%;padding:16px;background:white;border:1px solid var(--border);border-radius:var(--radius);font-size:16px;font-weight:700;text-align:left;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.store-btn-add{border-style:dashed;color:var(--green);font-weight:600}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:white;border-top:1px solid var(--border);display:flex;z-index:50;padding:6px 0 max(6px,env(safe-area-inset-bottom))}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;background:none;border:none;font-size:10px;font-weight:600;color:var(--text-muted)}
.nav-btn.active{color:var(--green)}
.nav-i{font-size:20px}
.empty{text-align:center;padding:40px 20px;color:var(--text-muted)}
.logo{width:36px;height:36px;border-radius:8px;object-fit:contain}
.logo-lg{width:80px;height:80px;border-radius:16px;object-fit:contain;margin-bottom:16px}
.result-card{border-radius:14px;padding:24px;margin:12px 0;text-align:center}
.result-buy{background:var(--green-light);border:1px solid rgba(42,128,32,.2)}
.result-ok{background:var(--yellow-light);border:1px solid rgba(184,134,11,.15)}
.result-pass{background:var(--red-light);border:1px solid rgba(204,68,68,.15)}
.prompt-card{background:var(--green);color:white;border-radius:14px;padding:20px;margin-bottom:16px;text-align:center}
.help-card{background:white;border-radius:var(--radius);padding:16px;border:1px solid var(--border)}
.sec-label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.sig{font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase}
@media(max-width:400px){.cnt{padding:0 12px 110px}.hdr{padding:12px 14px}}
</style>
</head>

function adjustedBP(baseBP){return A.userState?+(baseBP*(STATES[A.userState]||1)).toFixed(2):baseBP;}

function save(){localStorage.setItem('pt2',JSON.stringify({items:A.items,logs:A.logs,stores:A.stores,userState:A.userState}));}
function load(){try{const d=JSON.parse(localStorage.getItem('pt2'));if(d){A.items=d.items||[];A.logs=d.logs||{};A.stores=d.stores||[];A.userState=d.userState||null;if(A.userState)A.page='store_select';}}catch(e){}}

function addItem(name,cat,unit,bp){const id='i_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);const item={id,name,category:cat,unit,buy_price:parseFloat(bp)};A.items.push(item);A.logs[id]=[];save();render();toast(name+' added');return item;}
function deleteItem(id){A.items=A.items.filter(i=>i.id!==id);delete A.logs[id];save();A.page=A.activeStore?'shopping':'store_select';A.selectedItem=null;render();toast('Deleted');}
function addLog(itemId,total,pkg,store){store=store||A.activeStore;if(!store)return toast('Pick a store first');total=parseFloat(total);pkg=parseFloat(pkg)||1;if(!total||total<=0)return toast('Enter the price');const perUnit=+(total/pkg).toFixed(2);const log={id:'l_'+Date.now(),price:perUnit,total:total,pkg:pkg,store:norm(store),date:new Date().toISOString().split('T')[0]};if(!A.logs[itemId])A.logs[itemId]=[];A.logs[itemId].unshift(log);save();A._logResult={itemId,log};A.modal='result';render();}
function editLog(itemId,logId,newTotal,newPkg){const logs=A.logs[itemId]||[];const log=logs.find(l=>l.id===logId);if(!log)return;newTotal=parseFloat(newTotal);newPkg=parseFloat(newPkg)||1;if(!newTotal||newTotal<=0)return toast('Enter the price');log.total=newTotal;log.pkg=newPkg;log.price=+(newTotal/newPkg).toFixed(2);save();render();toast('Updated');}
function deleteLog(itemId,logId){A.logs[itemId]=(A.logs[itemId]||[]).filter(l=>l.id!==logId);save();render();toast('Deleted');}
function updateBP(id,bp){const it=A.items.find(i=>i.id===id);if(it){it.buy_price=parseFloat(bp);save();render();toast('Updated');}}
function renameItem(id,name){const it=A.items.find(i=>i.id===id);if(it&&name.trim()){it.name=name.trim();save();render();toast('Renamed');}}
function addStore(name){name=norm(name);if(!name)return toast('Enter a store name');if(!A.stores.includes(name))A.stores.push(name);save();A.activeStore=name;A.page='shopping';A.modal=null;render();toast(name+' added');}
function norm(s){if(!s||!s.trim())return'';return s.trim().split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()).join(' ');}
function sig(price,bp){if(price<=bp)return'buy';if(price<=bp*1.15)return'ok';return'high';}
function getBest(id){const l=A.logs[id]||[];if(!l.length)return null;return l.reduce((b,x)=>x.price<b.price?x:b,l[0]);}
function getLast(id,store){return(A.logs[id]||[]).filter(l=>l.store===store).sort((a,b)=>new Date(b.date)-new Date(a.date))[0]||null;}
function getPrevAt(id,store,excludeId){return(A.logs[id]||[]).filter(l=>l.store===store&&l.id!==excludeId).sort((a,b)=>new Date(b.date)-new Date(a.date))[0]||null;}
function fmtD(d){if(!d)return'';return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});}
let _t;function toast(m){let e=document.getElementById('toast');if(!e){e=document.createElement('div');e.id='toast';e.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#2d5016;color:white;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;max-width:320px;text-align:center';document.body.appendChild(e);}e.textContent=m;e.style.opacity='1';clearTimeout(_t);_t=setTimeout(()=>e.style.opacity='0',2500);}

// Search with debounce
let _sd;
function doSearch(val){
  A.search=val;
  clearTimeout(_sd);
  _sd=setTimeout(()=>{
    const el=document.getElementById('si');
    const pos=el?el.selectionStart:0;
    renderList();
    setTimeout(()=>{const el2=document.getElementById('si');if(el2){el2.focus();el2.setSelectionRange(pos,pos);}},0);
  },200);
}
function renderList(){
  const c=document.getElementById('item-list');
  if(c)c.innerHTML=buildItemList();
}

function render(){
  const app=document.getElementById('app');
  let h='';
  if(A.page==='welcome')h=rWelcome();
  else if(A.page==='store_select')h=rHdr('main')+rStoreSelect()+rNav();
  else if(A.page==='shopping')h=rHdr('shop')+rShopping()+rNav();
  else if(A.page==='detail')h=rHdr('detail')+rDetail()+rNav();
  else if(A.page==='stores')h=rHdr('main')+rStoresView()+rNav();
  else if(A.page==='more')h=rHdr('main')+rMore()+rNav();
  app.innerHTML=h;
  if(A.modal){const d=document.createElement('div');d.innerHTML=rModal();if(d.firstElementChild)app.appendChild(d.firstElementChild);}
}

    <div style="font-size:16px;color:var(--text);line-height:1.6;margin-bottom:24px;max-width:320px;font-weight:500">Know your prices.<br>Stop overpaying.<br>See the light — green, yellow, or red.</div>

function rShopping(){
  let h=`<div class="cnt" style="padding-top:8px">
    <input class="inp" id="si" placeholder="Search items..." value="${A.search}" oninput="doSearch(this.value)" style="margin-bottom:10px">
    <div id="item-list">${buildItemList()}</div>
  </div>`;
  return h;
}

function buildItemList(){
  const store=A.activeStore,q=A.search.toLowerCase();
  let h='';

  // Recently logged at this store
  if(!q){
    const recent=[];const all=[];
    A.items.forEach(item=>{(A.logs[item.id]||[]).filter(l=>l.store===store).forEach(l=>all.push({...l,_id:item.id}));});
    all.sort((a,b)=>new Date(b.date)-new Date(a.date));
    all.forEach(l=>{if(!recent.includes(l._id)&&recent.length<6)recent.push(l._id);});
    const recentItems=recent.map(id=>A.items.find(i=>i.id===id)).filter(Boolean);
    if(recentItems.length>0){
      h+=`<div class="sec-label">Recent</div>`;
      recentItems.forEach(item=>{h+=itemCard(item,store);});
      h+=`<div style="border-bottom:1px solid var(--border);margin:10px 0"></div>`;
    }
  }

  // All tracked items
  const tracked=A.items.filter(i=>!q||i.name.toLowerCase().includes(q));
  const recentIds=[];if(!q){const all2=[];A.items.forEach(item=>{(A.logs[item.id]||[]).filter(l=>l.store===store).forEach(l=>all2.push({...l,_id:item.id}));});all2.sort((a,b)=>new Date(b.date)-new Date(a.date));all2.forEach(l=>{if(!recentIds.includes(l._id)&&recentIds.length<6)recentIds.push(l._id);});}
  const main=q?tracked:tracked.filter(i=>!recentIds.includes(i.id));
  main.sort((a,b)=>a.name.localeCompare(b.name));
  if(main.length>0){
    if(!q&&recentIds.length>0)h+=`<div class="sec-label">All Items</div>`;
    main.forEach(item=>{h+=itemCard(item,store);});
  }

  // Suggested — all categories
  const unadded=STARTERS.filter(s=>!A.items.find(i=>i.name.toLowerCase()===s.name.toLowerCase())&&(!q||s.name.toLowerCase().includes(q)));
  if(unadded.length>0){
    h+=`<div class="sec-label" style="margin-top:14px">Suggested — Tap to Add</div>`;
    const cats=[...new Set(unadded.map(s=>s.cat))];
    cats.forEach(cat=>{
      h+=`<div style="font-size:10px;font-weight:700;color:var(--text-hint);text-transform:uppercase;letter-spacing:.05em;margin:10px 0 4px;padding-left:4px">${cat}</div>`;
      unadded.filter(s=>s.cat===cat).forEach(s=>{
        const abp=adjustedBP(s.bp);
        h+=`<div class="card" style="cursor:pointer;padding:12px 14px;border-style:dashed" onclick="const it=addItem('${s.name.replace(/'/g,"\\'")}','${s.cat}','${s.unit}',${abp});A.selectedItem=it;A.modal='logPrice';render()">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div style="font-size:14px;font-weight:600">${s.name}</div>
            <div style="text-align:right"><div style="font-size:12px;font-weight:700;color:var(--green)">$${abp.toFixed(2)}/${s.unit}</div><div style="font-size:9px;color:var(--text-hint)">buy target</div></div>
          </div>
        </div>`;
      });
    });
  }
  if(!tracked.length&&!unadded.length&&q)h+=`<div class="empty"><div style="font-size:14px">No results for "${A.search}"</div></div>`;
  h+=`<div style="text-align:center;padding:16px"><button class="btn btn-outline btn-sm" onclick="A.modal='addItem';render()">+ Custom Item</button></div>`;
  return h;
}

function itemCard(item,store){
  const bp=parseFloat(item.buy_price),last=getLast(item.id,store),best=getBest(item.id);
  const lp=last?last.price:null,s=lp?sig(lp,bp):null;
  const better=best&&lp&&best.store!==store&&best.price<lp;
  const cls=s==='buy'?'card card-buy':s==='high'?'card card-pass':'card';
  return`<div class="${cls}" style="cursor:pointer;padding:12px 14px" onclick="A.selectedItem=A.items.find(i=>i.id==='${item.id}');A.modal='logPrice';render()">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div style="flex:1;min-width:0">
        <div style="font-size:15px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${item.name}</div>
        <div style="font-size:11px;color:var(--text-muted)">Buy under $${bp.toFixed(2)}/${item.unit}</div>
        ${better?`<div style="font-size:11px;color:var(--green-bright);font-weight:600;margin-top:2px">💡 $${best.price.toFixed(2)} at ${best.store}</div>`:''}
      </div>
      <div style="text-align:right;margin-left:12px;flex-shrink:0">
        ${lp?`<div style="font-size:22px">${s==='buy'?'🟢':s==='high'?'🔴':'🟡'}</div>
          <div style="font-size:14px;font-weight:700">$${lp.toFixed(2)}</div>`
        :`<div style="font-size:12px;color:var(--green);font-weight:600">Tap to log</div>`}
      </div>
    </div>
  </div>`;
}

function rDetail(){
  const item=A.selectedItem;if(!item)return'';
  const bp=parseFloat(item.buy_price),logs=(A.logs[item.id]||[]).sort((a,b)=>new Date(b.date)-new Date(a.date)),best=getBest(item.id);
  let h=`<div class="cnt" style="padding-top:16px">
    <div style="font-size:12px;color:var(--text-muted)">${item.category} · per ${item.unit}</div>
    <div style="font-size:14px;font-weight:700;color:var(--green);margin:4px 0">Buy under $${bp.toFixed(2)}/${item.unit}</div>
    ${best?`<div style="font-size:13px;color:var(--green-bright);font-weight:600">Best: $${best.price.toFixed(2)} at ${best.store} (${fmtD(best.date)})</div>`:''}
    <div style="display:flex;gap:8px;margin:14px 0;flex-wrap:wrap">
      <button class="btn btn-outline btn-sm" onclick="A.modal='editBP';render()">Edit Buy Price</button>
      <button class="btn btn-outline btn-sm" onclick="A.modal='editName';render()">Edit Name</button>
      <button class="btn btn-sm" style="background:white;color:var(--red);border:1px solid var(--red)" onclick="if(confirm('Delete '+A.selectedItem.name+'?'))deleteItem('${item.id}')">Delete Item</button>
    </div>
    <div class="sec-label">History (${logs.length})</div>`;
  if(!logs.length)h+=`<div class="empty"><div style="font-size:14px">No prices logged yet</div></div>`;
  logs.forEach(l=>{
    const s=sig(l.price,bp);
    h+=`<div style="padding:10px 12px;background:white;border-radius:8px;margin-bottom:4px;border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
      <div><div style="font-size:13px;font-weight:600">${l.store}</div>
        <div style="font-size:11px;color:var(--text-muted)">${fmtD(l.date)}${l.pkg&&l.pkg>1?' · '+l.pkg+' '+item.unit+'s · $'+(l.total||l.price*l.pkg).toFixed(2)+' total':''}</div></div>
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:16px">${s==='buy'?'🟢':s==='high'?'🔴':'🟡'}</span>
        <span style="font-size:15px;font-weight:800">$${l.price.toFixed(2)}</span>
        <button style="background:none;border:none;font-size:14px;cursor:pointer;padding:4px;color:var(--text-hint)" onclick="event.stopPropagation();A._editLog={itemId:'${item.id}',logId:'${l.id}'};A.modal='editLog';render()">✏️</button>
        <button style="background:none;border:none;font-size:14px;cursor:pointer;padding:4px;color:var(--text-hint)" onclick="event.stopPropagation();if(confirm('Delete this entry?'))deleteLog('${item.id}','${l.id}')">🗑️</button>
      </div>
    </div>`;
  });
  h+=`</div>`;return h;
}

function rStoresView(){
  let h=`<div class="cnt" style="padding-top:16px">
    <div style="font-size:18px;font-weight:800;margin-bottom:4px">Your Stores</div>
    <div style="font-size:13px;color:var(--text-muted);margin-bottom:16px">Compare prices across stores</div>`;
  if(!A.stores.length)h+=`<div class="empty"><div style="font-size:36px">🏪</div><div style="font-size:14px;font-weight:600;margin-top:8px">No stores yet</div><div style="margin-top:12px"><button class="btn btn-primary btn-sm" onclick="A.modal='addStore';render()">+ Add Store</button></div></div>`;
  h+=`<div style="text-align:right;margin-bottom:12px"><button class="btn btn-outline btn-sm" onclick="A.modal='addStore';render()">+ Add Store</button></div>`;
  A.stores.forEach(store=>{
    const si=[];
    A.items.forEach(item=>{const ls=(A.logs[item.id]||[]).filter(l=>l.store===store);if(ls.length){const sorted=[...ls].sort((a,b)=>new Date(b.date)-new Date(a.date));const best=getBest(item.id);si.push({item,lp:sorted[0].price,date:sorted[0].date,bestP:best?best.price:sorted[0].price,bestS:best?best.store:store});}});
    const exp=A.expandedStore===store;
    h+=`<div class="card" style="cursor:pointer" onclick="A.expandedStore=A.expandedStore==='${store}'?null:'${store}';render()">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:15px;font-weight:700">🏪 ${store}</div><div style="font-size:11px;color:var(--text-muted)">${si.length} item${si.length!==1?'s':''}</div></div>
        <div style="color:var(--text-muted)">${exp?'▼':'▶'}</div>
      </div>
    </div>`;
    if(exp){si.sort((a,b)=>a.item.name.localeCompare(b.item.name));si.forEach(x=>{
      const isBest=x.bestS===store||x.lp<=x.bestP;const sav=(x.lp-x.bestP).toFixed(2);
      h+=`<div style="padding:10px 16px 10px 28px;background:white;border-bottom:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div><div style="font-size:13px;font-weight:600">${x.item.name}</div>
            ${!isBest&&parseFloat(sav)>0.05?`<div style="font-size:11px;color:var(--green-bright);font-weight:600">💡 Save $${sav} at ${x.bestS}</div>`:''}</div>
          <div style="display:flex;align-items:center;gap:6px"><span>${sig(x.lp,parseFloat(x.item.buy_price))==='buy'?'🟢':sig(x.lp,parseFloat(x.item.buy_price))==='high'?'🔴':'🟡'}</span><span style="font-size:14px;font-weight:700">$${x.lp.toFixed(2)}</span></div>
        </div>
      </div>`;})}
  });
  h+=`</div>`;return h;
}

function rModal(){

    <div class="modal-title">Add Store</div>
    <input class="inp" id="m-sn" placeholder="e.g. Food Lion, Aldi, Costco" autofocus>
    <button class="btn btn-primary" style="margin-top:14px" onclick="addStore(document.getElementById('m-sn').value)">Add & Start Shopping</button>
  </div></div>`;

  if(A.modal==='addItem')return`<div class="modal-overlay" onclick="A.modal=null;render()"><div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-title">Add Custom Item</div>
    <input class="inp" id="m-n" placeholder="Item name" style="margin-bottom:10px">
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <div class="lbl">Price per ___?</div><select class="inp" id="m-u">${UNITS.map(u=>'<option>'+u+'</option>').join('')}</select>

    <div class="lbl">Buy price — stock up below this</div>
    <input class="inp" id="m-bp" type="number" step="0.01" placeholder="e.g. 1.99" inputmode="decimal" style="margin-bottom:14px">

  </div></div>`;

  if(A.modal==='logPrice'&&A.selectedItem){
    const item=A.selectedItem,best=getBest(item.id);
    return`<div class="modal-overlay" onclick="A.modal=null;render()"><div class="modal-sheet" onclick="event.stopPropagation()">
      <div style="font-size:18px;font-weight:800;margin-bottom:4px">${item.name}</div>
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:14px">Buy under $${parseFloat(item.buy_price).toFixed(2)} per ${item.unit}</div>
      ${best?`<div style="background:var(--green-light);border-radius:8px;padding:8px 12px;margin-bottom:14px;font-size:12px"><strong>Best:</strong> $${best.price.toFixed(2)}/${item.unit} at ${best.store}</div>`:''}
      <div class="lbl">What is the total price on the tag?</div>
      <input class="inp" style="font-size:24px;font-weight:800;text-align:center;padding:16px" id="m-p" type="number" step="0.01" placeholder="$0.00" inputmode="decimal" autofocus oninput="calcU('${item.unit}')">
      <div class="lbl" style="margin-top:12px">${
  item.unit==='lb'?'How many lbs?':
  item.unit==='oz'?'How many oz?':
  item.unit==='gallon'?'How many gallons?':
  item.unit==='dozen'?'How many dozen?':
  item.unit==='loaf'?'How many loaves?':
  'How many?'
}</div>
      <input class="inp" style="font-size:20px;font-weight:700;text-align:center;padding:12px" id="m-pk" type="number" step="0.01" value="1" inputmode="decimal" oninput="calcU('${item.unit}')">
      <div id="uc" style="text-align:center;font-size:18px;font-weight:800;color:var(--green);margin:12px 0;min-height:28px"></div>
      <button class="btn btn-primary" onclick="addLog('${item.id}',document.getElementById('m-p').value,document.getElementById('m-pk').value);A.modal=null;">Log Price</button>
    </div></div>`;
  }

  if(A.modal==='result'&&A._logResult){
    const r=A._logResult,item=A.items.find(i=>i.id===r.itemId);
    if(!item){A.modal=null;return'';}
    const bp=parseFloat(item.buy_price),pu=r.log.price,s=sig(pu,bp),total=r.log.total||pu,pkg=r.log.pkg||1;
    const best=getBest(item.id),better=best&&best.store!==r.log.store&&best.price<pu;
    // Shrinkflation check
    const prev=getPrevAt(item.id,r.log.store,r.log.id);

    return`<div class="modal-overlay" onclick="A.modal=null;A._logResult=null;render()"><div class="modal-sheet" onclick="event.stopPropagation()">

      ${better?`<div style="background:var(--green-light);border-radius:10px;padding:12px;text-align:center;margin-bottom:12px;font-size:13px"><strong>💡 $${best.price.toFixed(2)} at ${best.store}</strong> — $${(pu-best.price).toFixed(2)} cheaper per ${item.unit}</div>`:''}
      ${shrunk?`<div style="background:var(--yellow-light);border-radius:10px;padding:12px;text-align:center;margin-bottom:12px;font-size:13px">⚠️ <strong>Shrinkflation alert:</strong> Last time this was ${prev.pkg} ${item.unit}s for $${prev.total.toFixed(2)}. Now it is ${pkg} for $${total.toFixed(2)}. You are paying more per ${item.unit}.</div>`:''}

      <button style="display:block;width:100%;margin-top:8px;background:var(--red-light);border:1px solid rgba(204,68,68,.2);border-radius:8px;color:var(--red);font-size:13px;font-weight:600;cursor:pointer;padding:10px" onclick="deleteLog('${r.itemId}','${r.log.id}');A.modal=null;A._logResult=null;render()">Wrong price? Tap to delete</button>

  if(A.modal==='editBP'&&A.selectedItem){
    const item=A.selectedItem;
    return`<div class="modal-overlay" onclick="A.modal=null;render()"><div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-title">Edit Buy Price</div>
      <div style="font-size:14px;margin-bottom:12px">${item.name}</div>
      <div class="lbl">Buy price — stock up below this</div>
      <input class="inp" id="m-eb" type="number" step="0.01" value="${parseFloat(item.buy_price).toFixed(2)}" inputmode="decimal" style="margin-bottom:14px">
      <button class="btn btn-primary" onclick="updateBP('${item.id}',document.getElementById('m-eb').value);A.modal=null;A.selectedItem=A.items.find(i=>i.id==='${item.id}');">Update</button>
    </div></div>`;
  }

  if(A.modal==='editName'&&A.selectedItem){
    const item=A.selectedItem;
    return`<div class="modal-overlay" onclick="A.modal=null;render()"><div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-title">Edit Name</div>
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:12px">Add a brand or rename</div>
      <input class="inp" id="m-en" value="${item.name}" style="margin-bottom:14px">
      <button class="btn btn-primary" onclick="renameItem('${item.id}',document.getElementById('m-en').value);A.modal=null;A.selectedItem=A.items.find(i=>i.id==='${item.id}');">Save</button>
    </div></div>`;
  }

  if(A.modal==='editLog'&&A._editLog){
    const e=A._editLog,item=A.items.find(i=>i.id===e.itemId),l=(A.logs[e.itemId]||[]).find(x=>x.id===e.logId);
    if(!item){A.modal=null;return'';}
    return`<div class="modal-overlay" onclick="A.modal=null;render()"><div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-title">Edit Price</div>
      <div style="font-size:14px;font-weight:600;margin-bottom:4px">${item.name} at ${l.store}</div>
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:14px">${fmtD(l.date)}</div>
      <div class="lbl">Total price</div>
      <input class="inp" id="m-et" type="number" step="0.01" value="${(l.total||l.price).toFixed(2)}" inputmode="decimal" style="margin-bottom:10px">
      <div class="lbl">${
  item.unit==='lb'?'How many lbs?':
  item.unit==='oz'?'How many oz?':
  item.unit==='gallon'?'How many gallons?':
  item.unit==='dozen'?'How many dozen?':
  item.unit==='loaf'?'How many loaves?':
  'How many?'
}</div>
      <input class="inp" id="m-ek" type="number" step="0.01" value="${l.pkg||1}" inputmode="decimal" style="margin-bottom:14px">
      <button class="btn btn-primary" onclick="editLog('${e.itemId}','${l.id}',document.getElementById('m-et').value,document.getElementById('m-ek').value);A.modal=null;A._editLog=null;">Save Changes</button>
      <button style="display:block;width:100%;margin-top:8px;background:none;border:1px solid var(--red);border-radius:8px;color:var(--red);font-size:13px;font-weight:600;cursor:pointer;padding:10px" onclick="deleteLog('${e.itemId}','${l.id}');A.modal=null;A._editLog=null;">Delete This Entry</button>
    </div></div>`;
  }
  return'';
}

function calcU(unit){const p=parseFloat(document.getElementById('m-p')?.value)||0,k=parseFloat(document.getElementById('m-pk')?.value)||1,u=document.getElementById('uc');if(u){if(p>0&&k>0)u.textContent='= $'+(p/k).toFixed(2)+' per '+unit;else u.textContent='';}}

load();render();

</script></body></html>
