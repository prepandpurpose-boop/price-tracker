  SUPABASE TABLE SETUP — Run these in your Supabase SQL editor

══════════════════════════════════════════════════════════════

CREATE TABLE IF NOT EXISTS price_tracker_items (
  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  user_id UUID NOT NULL REFERENCES auth.users(id) ON DELETE CASCADE,
  name TEXT NOT NULL,
  category TEXT NOT NULL DEFAULT 'Other',
  unit TEXT NOT NULL DEFAULT 'lb',
  buy_price NUMERIC(8,2) NOT NULL DEFAULT 0,
  created_at TIMESTAMPTZ DEFAULT now()
);

CREATE TABLE IF NOT EXISTS price_tracker_logs (
  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  item_id UUID NOT NULL REFERENCES price_tracker_items(id) ON DELETE CASCADE,
  user_id UUID NOT NULL REFERENCES auth.users(id) ON DELETE CASCADE,
  price NUMERIC(8,2) NOT NULL,
  store TEXT NOT NULL DEFAULT 'Unknown',
  qty NUMERIC(8,2) NOT NULL DEFAULT 1,
  logged_date DATE NOT NULL DEFAULT CURRENT_DATE,
  created_at TIMESTAMPTZ DEFAULT now()
);

ALTER TABLE price_tracker_items ENABLE ROW LEVEL SECURITY;
ALTER TABLE price_tracker_logs ENABLE ROW LEVEL SECURITY;

CREATE POLICY "Users see own items" ON price_tracker_items
  FOR ALL USING (auth.uid() = user_id);
CREATE POLICY "Users see own logs" ON price_tracker_logs
  FOR ALL USING (auth.uid() = user_id);

async function doSignup(){
  const email=document.getElementById('auth-email')?.value?.trim();
  const pass=document.getElementById('auth-pass')?.value;
  if(!email||!pass){return showToast('Enter email and password');}
  if(pass.length<6){return showToast('Password must be 6+ characters');}
  try{
    const r=await sb.auth('signup',email,pass);
    if(r.error)return showToast(r.error.message||'Signup failed');
    if(r.access_token){A.user=r.user;A.token=r.access_token;A.page='list';await loadData();render();}
    else{showToast('Check your email to confirm your account, then log in.');}
  }catch(e){showToast('Signup failed: '+e.message);}
}

async function doLogin(){
  const email=document.getElementById('auth-email')?.value?.trim();
  const pass=document.getElementById('auth-pass')?.value;
  if(!email||!pass){return showToast('Enter email and password');}
  try{
    const r=await sb.auth('token?grant_type=password',email,pass);
    if(r.error)return showToast(r.error.message||'Login failed');
    if(r.access_token){
      A.user=r.user;A.token=r.access_token;
      localStorage.setItem('pt_token',r.access_token);
      localStorage.setItem('pt_refresh',r.refresh_token);
      localStorage.setItem('pt_user',JSON.stringify(r.user));
      A.page='list';await loadData();render();
    }
  }catch(e){showToast('Login failed: '+e.message);}
}

function doLogout(){
  A.user=null;A.token=null;A.items=[];A.logs={};
  localStorage.removeItem('pt_token');localStorage.removeItem('pt_refresh');localStorage.removeItem('pt_user');
  A.page='landing';render();
}

async function tryAutoLogin(){
  const token=localStorage.getItem('pt_token');
  const user=localStorage.getItem('pt_user');
  if(token&&user){
    A.token=token;A.user=JSON.parse(user);A.page='list';
    try{await loadData();}catch(e){console.warn('Auto-load failed, using local');}
    render();
  }else{render();}
}

// ══════════════════════════════════════════════════════════════
//  DATA OPERATIONS
// ══════════════════════════════════════════════════════════════
async function loadData(){
  try{
    const items=await sb.rpc('price_tracker_items','GET',null,`?user_id=eq.${A.user.id}&order=name.asc`);
    A.items=items||[];
    // Load all logs for all items
    if(A.items.length>0){
      const ids=A.items.map(i=>i.id).join(',');
      const logs=await sb.rpc('price_tracker_logs','GET',null,`?item_id=in.(${ids})&order=logged_date.desc`);
      A.logs={};
      (logs||[]).forEach(l=>{
        if(!A.logs[l.item_id])A.logs[l.item_id]=[];
        A.logs[l.item_id].push(l);
      });
    }
    saveLocal();
  }catch(e){
    console.warn('Remote load failed, trying local');
    loadLocal();
  }
}

function saveLocal(){
  localStorage.setItem('pt_items',JSON.stringify(A.items));
  localStorage.setItem('pt_logs',JSON.stringify(A.logs));
}
function loadLocal(){
  try{
    A.items=JSON.parse(localStorage.getItem('pt_items')||'[]');
    A.logs=JSON.parse(localStorage.getItem('pt_logs')||'{}');
  }catch(e){}
}

async function addItem(name,category,unit,buyPrice){
  const item={user_id:A.user.id,name,category,unit,buy_price:parseFloat(buyPrice)};
  try{
    const r=await sb.rpc('price_tracker_items','POST',item);
    if(r&&r[0]){A.items.push(r[0]);A.logs[r[0].id]=[];saveLocal();render();showToast('Item added');}
  }catch(e){showToast('Failed to add: '+e.message);}
}

async function deleteItem(id){
  try{
    await sb.rpc('price_tracker_logs','DELETE',null,`?item_id=eq.${id}`);
    await sb.rpc('price_tracker_items','DELETE',null,`?id=eq.${id}`);
    A.items=A.items.filter(i=>i.id!==id);
    delete A.logs[id];
    saveLocal();A.page='list';A.selectedItem=null;render();showToast('Item deleted');
  }catch(e){showToast('Failed to delete: '+e.message);}
}

async function addLog(itemId,price,store,qty,date){
  const log={item_id:itemId,user_id:A.user.id,price:parseFloat(price),store,qty:parseFloat(qty)||1,logged_date:date||new Date().toISOString().split('T')[0]};
  try{
    const r=await sb.rpc('price_tracker_logs','POST',log);
    if(r&&r[0]){
      if(!A.logs[itemId])A.logs[itemId]=[];
      A.logs[itemId].unshift(r[0]);
      saveLocal();render();showToast('Price logged');
    }
  }catch(e){showToast('Failed to log: '+e.message);}
}

async function updateBuyPrice(itemId,newPrice){
  try{
    await sb.rpc('price_tracker_items','PATCH',{buy_price:parseFloat(newPrice)},`?id=eq.${itemId}`);
    const item=A.items.find(i=>i.id===itemId);
    if(item)item.buy_price=parseFloat(newPrice);
    saveLocal();render();showToast('Buy price updated');
  }catch(e){showToast('Failed to update: '+e.message);}
}

// ══════════════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════════════
function getStats(itemId){
  const logs=A.logs[itemId]||[];
  if(!logs.length)return{low:0,avg:0,high:0,last:0,lastDate:'',lastStore:'',count:0};
  const prices=logs.map(l=>parseFloat(l.price));
  const sorted=[...logs].sort((a,b)=>new Date(b.logged_date)-new Date(a.logged_date));
  return{
    low:Math.min(...prices),
    avg:+(prices.reduce((a,b)=>a+b,0)/prices.length).toFixed(2),
    high:Math.max(...prices),
    last:parseFloat(sorted[0].price),
    lastDate:sorted[0].logged_date,
    lastStore:sorted[0].store,
    count:logs.length
  };
}

function getSignal(price,buyPrice,avg){
  if(price<=buyPrice)return'buy';
  if(price<=avg*1.05)return'normal';
  return'pass';
}

function getStores(){
  const stores=new Set();
  Object.values(A.logs).forEach(logs=>logs.forEach(l=>stores.add(l.store)));
  return[...stores].sort();
}

function fmtDate(d){
  if(!d)return'';
  const dt=new Date(d+'T00:00:00');
  return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function fmtDateShort(d){
  if(!d)return'';
  const dt=new Date(d+'T00:00:00');
  return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

function pctInRange(val,low,high){
  const range=high-low||0.01;
  return Math.max(0,Math.min(100,((val-low)/range)*100));
}

let toastTimer;
function showToast(msg){
  let el=document.getElementById('toast');
  if(!el){el=document.createElement('div');el.id='toast';el.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--green);color:white;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;max-width:340px;text-align:center;';document.body.appendChild(el);}
  el.textContent=msg;el.style.opacity='1';
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>{el.style.opacity='0';},2500);
}

function render(){
  const app=document.getElementById('app');
  if(A.page==='landing')app.innerHTML=rLanding();
  else if(A.page==='list')app.innerHTML=rHeader()+rList()+rNav()+rModal();
  else if(A.page==='detail')app.innerHTML=rHeader()+rDetail()+rNav()+rModal();
  else if(A.page==='stores')app.innerHTML=rHeader()+rStores()+rNav()+rModal();
  else if(A.page==='insights')app.innerHTML=rHeader()+rInsights()+rNav()+rModal();
}

// ─── ITEM LIST ───
function rList(){
  const filtered=A.items.filter(i=>
    (A.filter==='All'||i.category===A.filter)&&
    (!A.search||i.name.toLowerCase().includes(A.search.toLowerCase()))
  );

  // Sort: items with "buy" signal first, then by name
  filtered.sort((a,b)=>{
    const sa=getStats(a.id),sb2=getStats(b.id);
    const sigA=sa.last?getSignal(sa.last,parseFloat(a.buy_price),sa.avg):'normal';
    const sigB=sb2.last?getSignal(sb2.last,parseFloat(b.buy_price),sb2.avg):'normal';
    const order={buy:0,normal:1,pass:2};
    if(order[sigA]!==order[sigB])return order[sigA]-order[sigB];
    return a.name.localeCompare(b.name);
  });

  let html=`<div class="content">
    ${A.items.length<3?`<div style="background:var(--green);color:white;border-radius:14px;padding:18px 16px;margin:12px 0">
      <div style="font-size:16px;font-weight:800;margin-bottom:8px">Welcome to Price Tracker</div>
      <div style="font-size:13px;line-height:1.6;opacity:.9;margin-bottom:12px">This app helps you know your real prices so you never overpay. Here is how it works:</div>
      <div style="font-size:12px;line-height:1.7;opacity:.85">
        <strong>1. Add items you buy regularly</strong> — tap them from the Quick Start list below, or add your own.<br>
        <strong>2. Set your buy price</strong> — this is the price where you stock up. Each starter item has a suggested price based on national averages.<br>
        <strong>3. Log prices at the store</strong> — tap an item, hit + Log Price, enter what you are paying today. Takes 5 seconds.<br>
        <strong>4. Watch the signals</strong> — 🟢 green means stock up, 🟡 yellow means normal, 🔴 red means pass if you can.<br>
        <strong>5. Learn your stores</strong> — tap the 🏪 Stores tab to see all prices organized by store. The app tells you when another store had a better price.
      </div>
      <div style="font-size:11px;margin-top:12px;opacity:.7">The goal: stop guessing, start knowing. Your data, your prices, your decisions.</div>
    </div>`:''}
    <div style="padding-top:12px">
      <input class="inp" placeholder="Search items..." value="${A.search}" oninput="A.search=this.value;render()">
    </div>
    <div class="filters">
      ${['All',...CATEGORIES].map(c=>`<button class="filter-chip ${A.filter===c?'active':''}" onclick="A.filter='${c}';render()">${c}</button>`).join('')}
    </div>`;

  if(A.items.length<10){
    // QUICK START — show starter items until user has 10+ items or dismisses
    html+=`<div style="margin-bottom:16px">
      <div style="font-size:18px;font-weight:800;margin-bottom:4px">Quick Start</div>
      <div style="font-size:13px;color:var(--text-muted);line-height:1.5;margin-bottom:16px">Tap the items you buy regularly. Each one comes with a suggested <strong>buy price</strong> — the price where you should stock up. You can adjust these later as you learn your own stores.</div>
    </div>`;
    const cats=[...new Set(STARTER_ITEMS.map(s=>s.category))];
    cats.forEach(cat=>{
      html+=`<div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;margin:12px 0 8px">${cat}</div>`;
      STARTER_ITEMS.filter(s=>s.category===cat&&!A.items.find(i=>i.name.toLowerCase()===s.name.toLowerCase())).forEach(s=>{
        html+=`<div class="card" style="cursor:pointer;padding:12px 14px" onclick="addItem('${s.name}','${s.category}','${s.unit}','${s.buy_price}')">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <div style="font-size:14px;font-weight:700">${s.name}</div>
              <div style="font-size:11px;color:var(--text-muted);margin-top:2px">${s.tip}</div>
            </div>
            <div style="text-align:right;flex-shrink:0;margin-left:12px">
              <div style="font-size:14px;font-weight:800;color:var(--green)">$${s.buy_price.toFixed(2)}</div>
              <div style="font-size:10px;color:var(--text-hint)">per ${s.unit}</div>
            </div>
          </div>
        </div>`;
      });
    });
    html+=`<div style="text-align:center;margin-top:20px;padding:16px">
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:12px">Don't see what you need?</div>
      <button class="btn btn-outline btn-sm" onclick="A.modal='addItem';render()">+ Add Custom Item</button>
      
    </div>`;
  }
  // Always show "Browse Suggestions" button if user has items but wants more
  if(A.items.length>=10){
    html+=`<div style="text-align:center;padding:8px 0 12px">
      <button class="btn btn-outline btn-sm" onclick="A.showSuggestions=!A.showSuggestions;render()">${A.showSuggestions?'Hide':'Browse'} Suggested Items</button>
    </div>`;
    if(A.showSuggestions){
      const cats=[...new Set(STARTER_ITEMS.map(s=>s.category))];
      cats.forEach(cat=>{
        const available=STARTER_ITEMS.filter(s=>s.category===cat&&!A.items.find(i=>i.name.toLowerCase()===s.name.toLowerCase()));
        if(available.length===0)return;
        html+=`<div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;margin:8px 0 6px">${cat}</div>`;
        available.forEach(s=>{
          html+=`<div class="card" style="cursor:pointer;padding:10px 14px" onclick="addItem('${s.name}','${s.category}','${s.unit}','${s.buy_price}')">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <div style="font-size:13px;font-weight:600">${s.name}</div>
              <div style="font-size:12px;font-weight:700;color:var(--green)">$${s.buy_price.toFixed(2)}/${s.unit}</div>
            </div>
          </div>`;
        });
      });
    }
  }
  if(filtered.length===0&&A.items.length>0){
    html+=`<div class="empty">
      <div class="empty-icon">🔍</div>
      <div style="font-size:15px;font-weight:600;margin-bottom:6px">No matches</div>
      <div style="font-size:13px">Try a different search or category.</div>
    </div>`;
  }

  filtered.forEach(item=>{
    const stats=getStats(item.id);
    const bp=parseFloat(item.buy_price);
    const signal=stats.last?getSignal(stats.last,bp,stats.avg):'none';
    const cardClass=signal==='buy'?'card card-buy':signal==='pass'?'card card-pass':'card';

    html+=`<div class="${cardClass}" onclick="A.selectedItem=A.items.find(i=>i.id==='${item.id}');A.page='detail';render()" style="cursor:pointer">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div style="flex:1;min-width:0">
          <div style="font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${item.name}</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:2px">${item.category} · per ${item.unit} · buy under $${bp.toFixed(2)}</div>
        </div>
        <div style="text-align:right;margin-left:12px;flex-shrink:0">
          ${stats.last?`
            <div style="font-size:18px;font-weight:800;color:${signal==='buy'?'var(--green-bright)':signal==='pass'?'var(--red)':'var(--text)'}">$${stats.last.toFixed(2)}</div>
            <div class="signal signal-${signal}"><span class="signal-dot"></span>${signal==='buy'?'STOCK UP':signal==='pass'?'PASS':'NORMAL'}</div>
          `:`<div style="font-size:12px;color:var(--text-hint)">No prices</div>`}
        </div>
      </div>
      ${stats.last?`
        <div class="price-bar">
          <div class="price-bar-fill" style="width:${pctInRange(stats.avg,stats.low,stats.high)}%"></div>
          ${bp>stats.low?`<div class="price-bar-buy" style="left:${pctInRange(bp,stats.low,stats.high)}%"></div>`:''}
          <div class="price-bar-current" style="left:${pctInRange(stats.last,stats.low,stats.high)}%;background:${signal==='buy'?'var(--green-bright)':signal==='pass'?'var(--red)':'var(--yellow)'}"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text-hint);margin-top:2px">
          <span>Low $${stats.low.toFixed(2)}</span><span>Avg $${stats.avg.toFixed(2)}</span><span>High $${stats.high.toFixed(2)}</span>
        </div>
      `:''}
    </div>`;
  });

  html+=`</div>`;
  return html;
}

// ─── DETAIL VIEW ───
function rDetail(){
  const item=A.selectedItem;
  if(!item)return'';
  const stats=getStats(item.id);
  const bp=parseFloat(item.buy_price);
  const signal=stats.last?getSignal(stats.last,bp,stats.avg):'normal';
  const logs=(A.logs[item.id]||[]).sort((a,b)=>new Date(b.logged_date)-new Date(a.logged_date));

  let html=`<div class="content" style="padding-top:16px">
    <div style="margin-bottom:20px">
      <div style="font-size:20px;font-weight:800">${item.name}</div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:4px">${item.category} · per ${item.unit} · buy under $${bp.toFixed(2)}</div>
    </div>`;

  // Current price card
  if(stats.last){
    const bgColor=signal==='buy'?'var(--green-light)':signal==='pass'?'var(--red-light)':'var(--yellow-light)';
    html+=`<div style="background:${bgColor};border-radius:14px;padding:16px 18px;margin-bottom:16px;border:1px solid ${signal==='buy'?'rgba(42,128,32,.15)':signal==='pass'?'rgba(204,68,68,.15)':'rgba(184,134,11,.12)'}">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em">Last Price</div>
          <div style="font-size:32px;font-weight:800;color:${signal==='buy'?'var(--green-bright)':signal==='pass'?'var(--red)':'var(--text)'};line-height:1.1;margin-top:4px">
            $${stats.last.toFixed(2)}<span style="font-size:14px;font-weight:500;color:var(--text-muted)">/${item.unit}</span>
          </div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:4px">${stats.lastStore} · ${fmtDateShort(stats.lastDate)}</div>
        </div>
        <div style="text-align:right">
          <div class="signal signal-${signal}"><span class="signal-dot"></span>${signal==='buy'?'STOCK UP':signal==='pass'?'PASS':'NORMAL'}</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:6px">
            ${signal==='buy'?'$'+(bp-stats.last).toFixed(2)+' under buy price':
              signal==='pass'?'$'+(stats.last-stats.avg).toFixed(2)+' above average':
              'At normal price'}
          </div>
        </div>
      </div>
      <div class="price-bar" style="margin-top:10px">
        <div class="price-bar-fill" style="width:${pctInRange(stats.avg,stats.low,stats.high)}%"></div>
        ${bp>stats.low?`<div class="price-bar-buy" style="left:${pctInRange(bp,stats.low,stats.high)}%"></div>`:''}
        <div class="price-bar-current" style="left:${pctInRange(stats.last,stats.low,stats.high)}%;background:${signal==='buy'?'var(--green-bright)':signal==='pass'?'var(--red)':'var(--yellow)'}"></div>
      </div>
    </div>`;
  }

  // Stats row
  html+=`<div class="stats-row">
    <div class="stat-card"><div class="stat-label">Lowest</div><div class="stat-value" style="color:var(--green-bright)">${stats.low?'$'+stats.low.toFixed(2):'—'}</div></div>
    <div class="stat-card"><div class="stat-label">Average</div><div class="stat-value" style="color:var(--yellow)">${stats.avg?'$'+stats.avg.toFixed(2):'—'}</div></div>
    <div class="stat-card"><div class="stat-label">Highest</div><div class="stat-value" style="color:var(--red)">${stats.high?'$'+stats.high.toFixed(2):'—'}</div></div>
  </div>`;

  // Smart buy price nudge
  if(stats.count>=3){
    const suggestedBuy=+(stats.avg*0.8).toFixed(2);// 20% below their average
    const currentBuy=parseFloat(item.buy_price);
    if(Math.abs(suggestedBuy-currentBuy)>0.10){
      html+=`<div class="alert" style="background:var(--yellow-light);border-color:rgba(184,134,11,.15)">
        <span style="font-size:16px">💡</span>
        <div style="font-size:12px;line-height:1.5">
          <strong>Buy price suggestion:</strong> Based on your ${stats.count} logged prices, your average is $${stats.avg.toFixed(2)}. 
          A buy price of <strong>$${suggestedBuy.toFixed(2)}</strong> (20% below your average) would catch the real deals.
          <button style="display:block;margin-top:6px;background:none;border:none;color:var(--green);font-weight:700;font-size:12px;padding:0;cursor:pointer;text-decoration:underline" 
            onclick="updateBuyPrice('${item.id}','${suggestedBuy}')">Set buy price to $${suggestedBuy.toFixed(2)}</button>
        </div>
      </div>`;
    }
  }

  // Edit buy price
  html+=`<div style="display:flex;gap:8px;margin-bottom:20px">
    <button class="btn btn-outline btn-sm" onclick="A.modal='editItem';render()">Edit Buy Price</button>
    <button class="btn btn-danger btn-sm" onclick="if(confirm('Delete this item and all its price history?'))deleteItem('${item.id}')">Delete Item</button>
  </div>`;

  // Price history
  html+=`<div style="font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px">Price History (${logs.length} entries)</div>`;

  if(logs.length===0){
    html+=`<div class="empty">
      <div class="empty-icon">📝</div>
      <div style="font-size:14px;font-weight:600;margin-bottom:4px">No prices logged yet</div>
      <div style="font-size:13px">Tap <strong>+ Log Price</strong> to add your first entry.</div>
    </div>`;
  }

  logs.forEach(log=>{
    const logSignal=getSignal(parseFloat(log.price),bp,stats.avg);
    html+=`<div class="log-row">
      <div>
        <div style="font-size:13px;font-weight:600">${log.store}</div>
        <div style="font-size:11px;color:var(--text-muted)">${fmtDateShort(log.logged_date)}${log.qty>1?' · '+log.qty+' '+item.unit+'s':''}</div>
      </div>
      <div style="font-size:15px;font-weight:800;color:${logSignal==='buy'?'var(--green-bright)':logSignal==='pass'?'var(--red)':'var(--text)'}">$${parseFloat(log.price).toFixed(2)}</div>
    </div>`;
  });

  html+=`</div>`;
  return html;
}

// ─── INSIGHTS ───
function rStores(){
  const stores=getStores();
  if(stores.length===0){
    return`<div class="content" style="padding-top:16px">
      <div style="font-size:20px;font-weight:800;margin-bottom:4px">Your Stores</div>
      <div class="empty">
        <div class="empty-icon">🏪</div>
        <div style="font-size:15px;font-weight:600;margin-bottom:6px">No stores yet</div>
        <div style="font-size:13px">Log your first price and the store will appear here automatically.</div>
      </div>
    </div>`;
  }

  let html=`<div class="content" style="padding-top:16px">
    <div style="font-size:20px;font-weight:800;margin-bottom:4px">Your Stores</div>
    <div style="font-size:13px;color:var(--text-muted);margin-bottom:16px">Tap a store to see all your prices there. Compare across stores to find the best deals.</div>`;

  stores.forEach(store=>{
    // Get all logs for this store with item info
    const storeItems=[];
    A.items.forEach(item=>{
      const logs=(A.logs[item.id]||[]).filter(l=>l.store===store);
      if(logs.length>0){
        const sorted=[...logs].sort((a,b)=>new Date(b.logged_date)-new Date(a.logged_date));
        const lastPrice=parseFloat(sorted[0].price);
        // Find best price across ALL stores for comparison
        const allLogs=A.logs[item.id]||[];
        const bestLog=allLogs.length>0?allLogs.reduce((best,l)=>parseFloat(l.price)<parseFloat(best.price)?l:best,allLogs[0]):null;
        const bestPrice=bestLog?parseFloat(bestLog.price):lastPrice;
        const bestStore=bestLog?bestLog.store:store;
        storeItems.push({item,lastPrice,lastDate:sorted[0].logged_date,bestPrice,bestStore,logCount:logs.length});
      }
    });

    const isExpanded=A.expandedStore===store;
    html+=`<div class="card" style="margin-bottom:8px;cursor:pointer" onclick="A.expandedStore=A.expandedStore==='${store}'?null:'${store}';render()">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:15px;font-weight:700">🏪 ${store}</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:2px">${storeItems.length} item${storeItems.length!==1?'s':''} tracked</div>
        </div>
        <div style="font-size:14px;color:var(--text-muted)">${isExpanded?'▼':'▶'}</div>
      </div>
    </div>`;

    if(isExpanded){
      storeItems.sort((a,b)=>a.item.name.localeCompare(b.item.name));
      storeItems.forEach(si=>{
        const isBest=si.bestStore===store||si.lastPrice<=si.bestPrice;
        const savings=si.lastPrice-si.bestPrice;
        html+=`<div style="padding:10px 16px 10px 28px;background:white;border-bottom:1px solid var(--border)">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div>
              <div style="font-size:13px;font-weight:600">${si.item.name}</div>
              <div style="font-size:11px;color:var(--text-muted)">Last: ${fmtDateShort(si.lastDate)} · ${si.logCount} log${si.logCount!==1?'s':''}</div>
              ${!isBest&&savings>0.05?`<div style="font-size:11px;color:var(--red);font-weight:600;margin-top:2px">💡 Save $${savings.toFixed(2)}/${si.item.unit} at ${si.bestStore}</div>`:''}
            </div>
            <div style="text-align:right">
              <div style="font-size:15px;font-weight:800;color:${isBest?'var(--green-bright)':'var(--text)'}">$${si.lastPrice.toFixed(2)}</div>
              <div style="font-size:10px;color:var(--text-hint)">per ${si.item.unit}</div>
            </div>
          </div>
        </div>`;
      });
    }
  });

  html+=`</div>`;
  return html;
}

function rInsights(){
  const stores=getStores();
  // Find items at buy price
  const deals=A.items.filter(item=>{
    const stats=getStats(item.id);
    return stats.last&&stats.last<=parseFloat(item.buy_price);
  });

  let html=`<div class="content" style="padding-top:16px">
    <div style="font-size:20px;font-weight:800;margin-bottom:4px">Insights</div>
    <div style="font-size:13px;color:var(--text-muted);margin-bottom:20px">Patterns from your price data.</div>`;

  // Stock up alerts
  if(deals.length>0){
    html+=`<div class="alert"><span style="font-size:18px">🟢</span><div><strong style="font-size:14px">Stock Up Now</strong><br>${deals.map(d=>{
      const stats=getStats(d.id);
      return`${d.name} — $${stats.last.toFixed(2)}/${d.unit} at ${stats.lastStore} (your buy price: $${parseFloat(d.buy_price).toFixed(2)})`;
    }).join('<br>')}</div></div>`;
  }else{
    html+=`<div style="background:white;border-radius:var(--radius);padding:20px;text-align:center;border:1px solid var(--border);margin-bottom:16px">
      <div style="font-size:24px;margin-bottom:8px">📊</div>
      <div style="font-size:14px;font-weight:600;margin-bottom:4px">No stock-up deals right now</div>
      <div style="font-size:12px;color:var(--text-muted)">Keep logging prices and you'll see alerts here when items hit your buy price.</div>
    </div>`;
  }

  // Stores tracked
  html+=`<div style="font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;margin:20px 0 10px">Your Stores (${stores.length})</div>`;
  if(stores.length>0){
    stores.forEach(store=>{
      // Count logs for this store
      let count=0;
      Object.values(A.logs).forEach(logs=>logs.forEach(l=>{if(l.store===store)count++;}));
      html+=`<div class="card" style="padding:10px 14px;margin-bottom:4px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div style="font-size:14px;font-weight:600">🏪 ${store}</div>
          <div style="font-size:12px;color:var(--text-muted)">${count} price${count!==1?'s':''} logged</div>
        </div>
      </div>`;
    });
  }else{
    html+=`<div style="font-size:13px;color:var(--text-muted)">Stores appear here after you log your first price.</div>`;
  }

  // Summary stats
  let totalLogs=0;
  Object.values(A.logs).forEach(l=>totalLogs+=l.length);
  html+=`<div style="font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;margin:24px 0 10px">Summary</div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">Items</div><div class="stat-value" style="color:var(--green)">${A.items.length}</div></div>
    <div class="stat-card"><div class="stat-label">Prices Logged</div><div class="stat-value" style="color:var(--green)">${totalLogs}</div></div>
    <div class="stat-card"><div class="stat-label">Stores</div><div class="stat-value" style="color:var(--green)">${stores.length}</div></div>
  </div>`;

  html+=`<button class="btn btn-outline" style="margin-top:20px;font-size:13px;color:var(--red);border-color:var(--red)" onclick="if(confirm('Sign out?'))doLogout()">Sign Out</button>`;
  html+=`</div>`;
  return html;
}

    return`<div class="modal-overlay" onclick="A.modal=null;render()">
      <div class="modal-sheet" onclick="event.stopPropagation()">
        <div class="modal-title">Log Price — ${item.name}</div>
        ${stores.length>0?`
          <div class="lbl">Quick Pick Store</div>
          <div class="store-chips" id="store-chips">
            ${stores.map(s=>`<button class="store-chip" onclick="document.getElementById('m-store').value='${s}';document.querySelectorAll('.store-chip').forEach(c=>c.classList.remove('active'));this.classList.add('active')">${s}</button>`).join('')}
          </div>
        `:''}
        <div class="lbl">Store</div>
        <input class="inp" id="m-store" placeholder="Store name" value="${stores[0]||''}" style="margin-bottom:10px">
        ${(()=>{
          const _allLogs=A.logs[item.id]||[];
          if(_allLogs.length===0)return'';
          const _best=_allLogs.reduce((b,l)=>parseFloat(l.price)<parseFloat(b.price)?l:b,_allLogs[0]);
          const _recent=[..._allLogs].sort((a,b)=>new Date(b.logged_date)-new Date(a.logged_date))[0];
          return`<div style="background:var(--green-light);border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:12px;line-height:1.5">
            <strong>Your best price:</strong> $${parseFloat(_best.price).toFixed(2)}/${item.unit} at ${_best.store} (${fmtDateShort(_best.logged_date)})<br>
            <strong>Last logged:</strong> $${parseFloat(_recent.price).toFixed(2)}/${item.unit} at ${_recent.store} (${fmtDateShort(_recent.logged_date)})
          </div>`;
        })()}
        <div class="lbl">Price per ${item.unit}</div>
        <input class="inp inp-price" id="m-price" type="number" step="0.01" placeholder="0.00" style="margin-bottom:10px" inputmode="decimal">

          <div style="flex:1">
            <div class="lbl">Date</div>

          </div>
        </div>
        <button class="btn btn-primary" style="margin-top:6px" onclick="addLog(
          '${item.id}',
          document.getElementById('m-price').value,
          document.getElementById('m-store').value,
          document.getElementById('m-qty').value,
          document.getElementById('m-date').value
        );A.modal=null;">Log Price</button>
      </div>
    </div>`;
  }

  if(A.modal==='editItem'&&A.selectedItem){
    const item=A.selectedItem;
    return`<div class="modal-overlay" onclick="A.modal=null;render()">
      <div class="modal-sheet" onclick="event.stopPropagation()">
        <div class="modal-title">Edit Buy Price — ${item.name}</div>
        <div class="lbl">Buy Price (stock up below this)</div>
        <input class="inp" id="m-editbuy" type="number" step="0.01" value="${parseFloat(item.buy_price).toFixed(2)}" style="margin-bottom:16px">
        <button class="btn btn-primary" onclick="updateBuyPrice('${item.id}',document.getElementById('m-editbuy').value);A.modal=null;A.selectedItem=A.items.find(i=>i.id==='${item.id}');">Update</button>
      </div>
    </div>`;
  }

  return'';
}

// ══════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════
tryAutoLogin();
</script>
</body>
</html>
