<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Price Tracker">
<title>Price Tracker — Prep & Purpose</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--green:#2d5016;--green-mid:#4a7c28;--green-bright:#2a8020;--green-light:#e8f0e0;--cream:#faf8f3;--text:#1a1a1a;--text-muted:#6b6b6b;--text-hint:#999;--border:#e5e2db;--red:#c44;--red-light:#fef0f0;--yellow:#b8860b;--yellow-light:#fdf8ed;--orange:#c45e00;--orange-light:#fff3e8;--radius:12px;--shadow:0 1px 3px rgba(0,0,0,.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
input,select,button{font-family:inherit}
button{cursor:pointer}
.app{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;background:var(--cream);overflow-x:hidden}
.hdr{background:var(--green);color:white;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.hdr-title{font-size:17px;font-weight:800}
.hdr-sub{font-size:10px;opacity:.65;margin-top:1px;font-weight:500}
.hdr-btn{background:white;color:var(--green);border:none;border-radius:8px;padding:8px 14px;font-weight:700;font-size:12px}
.hdr-back{background:none;border:none;color:white;font-size:14px;font-weight:600;padding:4px 8px}
.cnt{padding:0 16px 110px}
.card{background:white;border-radius:var(--radius);border:1px solid var(--border);padding:14px 16px;margin-bottom:8px;box-shadow:var(--shadow)}
.card-buy{border-color:rgba(42,128,32,.2)}
.card-pass{border-color:rgba(204,68,68,.15)}
.inp{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:white}
.inp:focus{outline:none;border-color:var(--green-mid);box-shadow:0 0 0 2px rgba(45,80,22,.12)}
.lbl{display:block;font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:700}
.btn-primary{background:var(--green);color:white}
.btn-outline{background:white;color:var(--green);border:1px solid var(--green)}
.btn-sm{padding:8px 14px;font-size:12px;width:auto;border-radius:8px}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:200}
.modal-sheet{background:white;border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%;max-width:480px;max-height:92dvh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:800;margin-bottom:16px}
.store-btn{width:100%;padding:16px;background:white;border:1px solid var(--border);border-radius:var(--radius);font-size:16px;font-weight:700;text-align:left;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.store-btn-add{border-style:dashed;color:var(--green);font-weight:600}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:white;border-top:1px solid var(--border);display:flex;z-index:50;padding:6px 0 max(6px,env(safe-area-inset-bottom))}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;background:none;border:none;font-size:10px;font-weight:600;color:var(--text-muted)}
.nav-btn.active{color:var(--green)}
.nav-i{font-size:20px}
.empty{text-align:center;padding:40px 20px;color:var(--text-muted)}
.logo{width:36px;height:36px;border-radius:8px;object-fit:contain}
.logo-lg{width:80px;height:80px;border-radius:16px;object-fit:contain;margin-bottom:16px}
.result-card{border-radius:14px;padding:24px;margin:12px 0;text-align:center}
.result-buy{background:var(--green-light);border:1px solid rgba(42,128,32,.2)}
.result-ok{background:var(--yellow-light);border:1px solid rgba(184,134,11,.15)}
.result-pass{background:var(--red-light);border:1px solid rgba(204,68,68,.15)}
.prompt-card{background:var(--green);color:white;border-radius:14px;padding:20px;margin-bottom:16px;text-align:center}
.help-card{background:white;border-radius:var(--radius);padding:16px;border:1px solid var(--border)}
.sec-label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.sig{font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase}
.deal-tabs{display:flex;gap:6px;margin-bottom:12px}
.deal-tab{flex:1;padding:8px 4px;border:1px solid var(--border);border-radius:8px;background:white;font-size:12px;font-weight:700;color:var(--text-muted);text-align:center}
.deal-tab.active{background:var(--green);color:white;border-color:var(--green)}
.exp-wrap{background:var(--green-light);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);margin-top:-9px;margin-bottom:8px;overflow:hidden}
.exp-row{padding:10px 16px;border-bottom:1px solid rgba(0,0,0,.05)}
.exp-row:last-child{border-bottom:none}
@media(max-width:400px){.cnt{padding:0 12px 110px}.hdr{padding:12px 14px}}
</style>
</head>

function adjustedBP(baseBP){return A.userState?+(baseBP*(STATES[A.userState]||1)).toFixed(2):baseBP;}

// Guess mode + buy price for a custom item from its name
function guessItem(name){
  const n=(name||'').toLowerCase();
  const hasSizeOz=/\d+\s*oz/.test(n);
  const has=arr=>arr.some(w=>n.includes(w));
  // oils — check before starter lookup so premium oil names don't hit generic starters
  if(has(['olive oil','avocado oil','coconut oil','vegetable oil','canola oil','cooking oil','oil']))
    return{unit:'package',mode:'package',bp:adjustedBP(9.99)};
  // exact match to a starter
  const hit=STARTERS.find(s=>n&&(s.name.toLowerCase().includes(n)||n.includes(s.name.toLowerCase())));
  if(hit&&!hasSizeOz)return{unit:hit.unit,mode:hit.mode,bp:adjustedBP(hit.bp)};
  // specific package sizes — treat as package
  if(hasSizeOz)return{unit:'package',mode:'package',bp:adjustedBP(4.99)};
  // by-weight meat/produce items
  if(has(['beef','pork','chicken','turkey','steak','roast','meat','sausage','bacon','ham','fish','salmon','shrimp','potato','onion','carrot','banana','apple','produce','fruit','veggie','vegetable']))
    return{unit:'lb',mode:'unit',bp:adjustedBP(2.99)};
  // pantry/dry goods by weight
  if(has(['flour','sugar','rice','oats','grain','lentil','dried']))
    return{unit:'lb',mode:'unit',bp:adjustedBP(1.49)};
  // dairy packages
  if(has(['butter','cheese','cream cheese','yogurt','milk','sour cream','creamer','half and half']))
    return{unit:'package',mode:'package',bp:adjustedBP(4.99)};
  // beverages
  if(has(['juice','soda','water','drink','beverage','broth','stock','kombucha','tea','coffee']))
    return{unit:'package',mode:'package',bp:adjustedBP(4.99)};
  // bread/bakery
  if(has(['bread','loaf','bun','roll','tortilla','bagel','muffin','croissant']))
    return{unit:'package',mode:'package',bp:adjustedBP(4.49)};
  // pantry packages
  if(has(['pasta','bean','beans','tomato','corn','tuna','soup','sauce','peanut butter','nut butter','jam','jelly','syrup','honey','vinegar','mayo','mustard','ketchup','dressing']))
    return{unit:'package',mode:'package',bp:adjustedBP(3.49)};
  // household/cleaning
  if(has(['paper','towel','tissue','napkin','foil','wrap','bag','trash','soap','detergent','cleaner','sponge','bleach']))
    return{unit:'package',mode:'package',bp:adjustedBP(6.99)};
  // generic package fallback
  if(has(['box','pack','bottle','jar','can','container']))
    return{unit:'package',mode:'package',bp:adjustedBP(3.99)};
  // default: by the pound
  return{unit:'lb',mode:'unit',bp:adjustedBP(2.49)};
}

function save(){localStorage.setItem('pt2',JSON.stringify({items:A.items,logs:A.logs,stores:A.stores,userState:A.userState}));}
function load(){try{const d=JSON.parse(localStorage.getItem('pt2'));if(d){A.items=(d.items||[]).map(migrateItem);A.logs=d.logs||{};A.stores=d.stores||[];A.userState=d.userState||null;if(A.userState)A.page='store_select';}}catch(e){}}

// Backfill mode on items saved before this version
function migrateItem(it){
  if(!it.mode){
    const st=STARTERS.find(s=>s.name.toLowerCase()===(it.name||'').toLowerCase());
    if(st){
      it.mode=st.mode;
      it.unit=st.unit;
      // always reset buy price to current starter target when mode changes
      it.buy_price=adjustedBP(st.bp);
    }
    else if(it.unit==='count'||it.unit==='oz'||it.unit==='dozen'||it.unit==='gallon'||it.unit==='loaf'){
      // old non-lb unit items were always package-style
      it.mode='package';it.unit='package';
      if(parseFloat(it.buy_price)<2)it.buy_price=+(parseFloat(it.buy_price||1)*6).toFixed(2);
    }
    else it.mode='unit';
  }
  // fix any surviving oz/dozen/gallon/loaf unit-mode items to show correctly
  if(it.mode==='unit'&&it.unit!=='lb'){it.mode='package';it.unit='package';}
  return it;
}

function addItem(name,unit,bp,mode){const id='i_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);const item={id,name,unit,buy_price:parseFloat(bp),mode:mode||'unit'};A.items.push(item);A.logs[id]=[];save();render();toast(name+' added');return item;}
function deleteItem(id){A.items=A.items.filter(i=>i.id!==id);delete A.logs[id];save();A.page=A.activeStore?'shopping':'store_select';A.selectedItem=null;render();toast('Deleted');}

// price stored = exactly what the user typed. No division. Ever.
// pkgQty + pkgUnit = optional shrinkflation tracking, stored separately from price.
function addLog(itemId,price,store,pkgQty,pkgUnit){
  const item=A.items.find(i=>i.id===itemId);if(!item)return;
  store=store||A.activeStore;if(!store)return toast('Pick a store first');
  price=parseFloat(price);
  if(!price||price<=0)return toast('Enter the price');
  const log={id:'l_'+Date.now(),price:+price.toFixed(2),total:+price.toFixed(2),store:norm(store),date:new Date().toISOString().split('T')[0]};
  if(pkgQty&&parseFloat(pkgQty)>0){log.pkgQty=+parseFloat(pkgQty).toFixed(2);log.pkgUnit=pkgUnit||'ct';}
  if(!A.logs[itemId])A.logs[itemId]=[];A.logs[itemId].unshift(log);
  save();A._logResult={itemId,log};A.modal='result';render();
}
function editLog(itemId,logId,newPrice,newPkgQty,newPkgUnit){
  const logs=A.logs[itemId]||[];const log=logs.find(l=>l.id===logId);if(!log)return;
  newPrice=parseFloat(newPrice);
  if(!newPrice||newPrice<=0)return toast('Enter the price');
  log.price=+newPrice.toFixed(2);log.total=+newPrice.toFixed(2);
  if(newPkgQty&&parseFloat(newPkgQty)>0){log.pkgQty=+parseFloat(newPkgQty).toFixed(2);log.pkgUnit=newPkgUnit||'ct';}
  else{delete log.pkgQty;delete log.pkgUnit;}
  save();render();toast('Updated');
}
function deleteLog(itemId,logId){A.logs[itemId]=(A.logs[itemId]||[]).filter(l=>l.id!==logId);save();render();toast('Deleted');}
function updateBP(id,bp){const it=A.items.find(i=>i.id===id);if(it){it.buy_price=parseFloat(bp);save();render();toast('Updated');}}
function renameItem(id,name){const it=A.items.find(i=>i.id===id);if(it&&name.trim()){it.name=name.trim();save();render();toast('Renamed');}}
function addStore(name){name=norm(name);if(!name)return toast('Enter a store name');if(!A.stores.includes(name))A.stores.push(name);save();A.activeStore=name;A.page='shopping';A.modal=null;render();toast(name+' added');}
function deleteStore(name){
  A.stores=A.stores.filter(s=>s!==name);
  if(A.activeStore===name)A.activeStore=null;
  if(A.expandedStore===name)A.expandedStore=null;
  save();render();toast(name+' removed');
}
function norm(s){if(!s||!s.trim())return'';return s.trim().split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()).join(' ');}
// escape for use inside single-quoted JS string in an inline onclick
function esc(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function sig(price,bp){if(price<=bp)return'buy';if(price<=bp*1.15)return'ok';return'high';}
function getBest(id){const l=A.logs[id]||[];if(!l.length)return null;return l.reduce((b,x)=>x.price<b.price?x:b,l[0]);}
function getLast(id,store){return(A.logs[id]||[]).filter(l=>l.store===store).sort((a,b)=>new Date(b.date)-new Date(a.date))[0]||null;}
function getPrevAt(id,store,excludeId){return(A.logs[id]||[]).filter(l=>l.store===store&&l.id!==excludeId).sort((a,b)=>new Date(b.date)-new Date(a.date))[0]||null;}
function fmtD(d){if(!d)return'';return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});}
// label for the price unit shown to user
function priceLabel(item){return item.mode==='package'?'package':item.unit;}
function qtyLabel(item){
  if(item.mode==='package')return'How many in the package? (count — optional)';
  switch(item.unit){
    case'lb':return'How many lbs?';
    case'oz':return'How many oz?';
    case'gallon':return'How many gallons?';
    case'dozen':return'How many dozen?';
    case'loaf':return'How many loaves?';
    default:return'How many?';
  }
}
let _t;function toast(m){let e=document.getElementById('toast');if(!e){e=document.createElement('div');e.id='toast';e.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#2d5016;color:white;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;max-width:320px;text-align:center';document.body.appendChild(e);}e.textContent=m;e.style.opacity='1';clearTimeout(_t);_t=setTimeout(()=>e.style.opacity='0',2500);}

// Export — show backup text in a modal so user can copy it anywhere (Notes, email, etc.)
// No file download needed — works on every device including iOS home screen apps.
function exportData(){
  A._exportText=JSON.stringify({v:2,exported:new Date().toISOString(),items:A.items,logs:A.logs,stores:A.stores,userState:A.userState},null,0);
  A.modal='exportData';render();
}
function importData(text){
  try{
    const d=JSON.parse(text);
    if(!d||!d.items)return toast('That does not look like a backup');
    A.items=(d.items||[]).map(migrateItem);A.logs=d.logs||{};A.stores=d.stores||[];A.userState=d.userState||A.userState;
    save();A.modal=null;A.page=A.userState?'store_select':'welcome';A.activeStore=null;render();toast('Backup restored');
  }catch(e){toast('Could not read that backup');}
}

// Search with debounce
let _sd;
function doSearch(val){
  A.search=val;
  clearTimeout(_sd);
  _sd=setTimeout(()=>{
    const el=document.getElementById('si');
    const pos=el?el.selectionStart:0;
    renderList();
    setTimeout(()=>{const el2=document.getElementById('si');if(el2){el2.focus();el2.setSelectionRange(pos,pos);}},0);
  },200);
}
function renderList(){
  const c=document.getElementById('item-list');
  if(c)c.innerHTML=buildItemList();
}

function render(){
  const app=document.getElementById('app');
  let h='';
  if(A.page==='welcome')h=rWelcome();
  else if(A.page==='store_select')h=rHdr('main')+rStoreSelect()+rNav();
  else if(A.page==='shopping')h=rHdr('shop')+rShopping()+rNav();
  else if(A.page==='detail')h=rHdr('detail')+rDetail()+rNav();
  else if(A.page==='stores')h=rHdr('main')+rStoresView()+rNav();
  else if(A.page==='more')h=rHdr('main')+rMore()+rNav();
  else if(A.page==='settings')h=rHdr('settings')+rSettings()+rNav();
  app.innerHTML=h;
  if(A.modal){const d=document.createElement('div');d.innerHTML=rModal();if(d.firstElementChild)app.appendChild(d.firstElementChild);}
}

function buildItemList(){
  const store=A.activeStore,q=A.search.toLowerCase();
  let h='';

  if(!q){
    const recent=[];const all=[];
    A.items.forEach(item=>{(A.logs[item.id]||[]).filter(l=>l.store===store).forEach(l=>all.push({...l,_id:item.id}));});
    all.sort((a,b)=>new Date(b.date)-new Date(a.date));
    all.forEach(l=>{if(!recent.includes(l._id)&&recent.length<6)recent.push(l._id);});
    const recentItems=recent.map(id=>A.items.find(i=>i.id===id)).filter(Boolean);
    if(recentItems.length>0){
      h+=`<div class="sec-label">Recent</div>`;
      recentItems.forEach(item=>{h+=itemCard(item,store);});
      h+=`<div style="border-bottom:1px solid var(--border);margin:10px 0"></div>`;
    }
  }

  const tracked=A.items.filter(i=>!q||i.name.toLowerCase().includes(q));
  const recentIds=[];if(!q){const all2=[];A.items.forEach(item=>{(A.logs[item.id]||[]).filter(l=>l.store===store).forEach(l=>all2.push({...l,_id:item.id}));});all2.sort((a,b)=>new Date(b.date)-new Date(a.date));all2.forEach(l=>{if(!recentIds.includes(l._id)&&recentIds.length<6)recentIds.push(l._id);});}
  const main=q?tracked:tracked.filter(i=>!recentIds.includes(i.id));
  main.sort((a,b)=>a.name.localeCompare(b.name));
  if(main.length>0){
    if(!q&&recentIds.length>0)h+=`<div class="sec-label">All Items</div>`;
    main.forEach(item=>{h+=itemCard(item,store);});
  }

  const unadded=STARTERS.filter(s=>!A.items.find(i=>i.name.toLowerCase()===s.name.toLowerCase())&&(!q||s.name.toLowerCase().includes(q)));
  if(unadded.length>0){
    h+=`<div class="sec-label" style="margin-top:14px">Suggested — Tap to Add</div>`;
    unadded.forEach(s=>{
      const abp=adjustedBP(s.bp);
      const lbl=s.mode==='package'?'/pkg':'/lb';
      h+=`<div class="card" style="cursor:pointer;padding:12px 14px;border-style:dashed" onclick="const it=addItem('${esc(s.name)}','${s.unit}',${abp},'${s.mode}');A.selectedItem=it;A._dealMode='plain';A.modal='logPrice';render()">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div style="font-size:14px;font-weight:600">${s.name}</div>
          <div style="text-align:right"><div style="font-size:12px;font-weight:700;color:var(--green)">$${abp.toFixed(2)}${lbl}</div><div style="font-size:9px;color:var(--text-hint)">buy target</div></div>
        </div>
      </div>`;
    });
  }
  if(!tracked.length&&!unadded.length&&q)h+=`<div class="empty"><div style="font-size:14px">No results for "${A.search}"</div></div>`;
  h+=`<div style="text-align:center;padding:16px"><button class="btn btn-outline btn-sm" onclick="A.modal='addItem';render()">+ Custom Item</button></div>`;
  return h;
}

function itemCard(item,store){
  const bp=parseFloat(item.buy_price),last=getLast(item.id,store),best=getBest(item.id);
  const lp=last?last.price:null,s=lp?sig(lp,bp):null;
  const better=best&&lp&&best.store!==store&&best.price<lp;
  const cls=s==='buy'?'card card-buy':s==='high'?'card card-pass':'card';
  const ul=priceLabel(item);
  return`<div class="${cls}" style="cursor:pointer;padding:12px 14px" onclick="A.selectedItem=A.items.find(i=>i.id==='${item.id}');A._dealMode='plain';A.modal='logPrice';render()">

      <div style="flex:1;min-width:0">
        <div style="font-size:15px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${item.name}</div>
        <div style="font-size:11px;color:var(--text-muted)">Buy under $${bp.toFixed(2)}/${ul}</div>
        ${better?`<div style="font-size:11px;color:var(--green-bright);font-weight:600;margin-top:2px">💡 $${best.price.toFixed(2)} at ${best.store}</div>`:''}
      </div>
      <div style="text-align:right;margin-left:12px;flex-shrink:0">
        ${lp?`<div style="font-size:22px">${s==='buy'?'🟢':s==='high'?'🔴':'🟡'}</div>
          <div style="font-size:14px;font-weight:700">$${lp.toFixed(2)}</div>`
        :`<div style="font-size:12px;color:var(--green);font-weight:600">Tap to log</div>`}
      </div>
    </div>
  </div>`;
}

function setDeal(mode){A._dealMode=mode;const item=A.selectedItem;if(item){renderLogBody(item);}}

// What to call the price unit in labels
function priceLabel(item){
  if(item.mode==='package')return'package';
  if(item.unit==='lb')return'lb';
  return'package'; // anything else (old oz, gallon, dozen) is effectively a package price
}

function priceLblFor(item,dm){
  const isPerLb=item.mode==='unit'&&item.unit==='lb';
  if(dm==='twofor')return isPerLb?'Total deal price (e.g. 2 for $6)':'Total deal price (e.g. 2 for $10)';
  if(dm==='bogo')return isPerLb?'Price per lb of ONE item':'Price of ONE package';
  if(dm==='markdown')return isPerLb?'Marked-down price per lb':'Marked-down package price';
  return isPerLb?'Price per lb on the tag':'Total price on the tag';
}

function logBody(item){
  const best=getBest(item.id);
  const dm=A._dealMode||'plain';
  const ul=priceLabel(item);
  const isPkg=item.mode==='package';

  let body=`<div style="font-size:18px;font-weight:800;margin-bottom:4px">${item.name}</div>
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:14px">Buy under $${parseFloat(item.buy_price).toFixed(2)} per ${ul}</div>
    ${best?`<div style="background:var(--green-light);border-radius:8px;padding:8px 12px;margin-bottom:14px;font-size:12px"><strong>Best seen:</strong> $${best.price.toFixed(2)}/${ul} at ${best.store}</div>`:''}
    <div class="deal-tabs" style="font-size:11px">
      <div class="deal-tab ${dm==='plain'?'active':''}" onclick="setDeal('plain')">Regular</div>
      <div class="deal-tab ${dm==='markdown'?'active':''}" onclick="setDeal('markdown')">Markdown</div>
      <div class="deal-tab ${dm==='twofor'?'active':''}" onclick="setDeal('twofor')">2 for $X</div>
      <div class="deal-tab ${dm==='bogo'?'active':''}" onclick="setDeal('bogo')">Buy 1 Get 1</div>
    </div>
    <div class="lbl">${priceLblFor(item,dm)}</div>
    <input class="inp" style="font-size:28px;font-weight:800;text-align:center;padding:18px" id="m-p" type="number" step="0.01" placeholder="$0.00" inputmode="decimal" autofocus oninput="calcU()">`;

  if(dm==='twofor'){
    body+=`<div class="lbl" style="margin-top:12px">How many in the deal?</div>
      <input class="inp" style="font-size:20px;font-weight:700;text-align:center;padding:12px" id="m-dealn" type="number" step="1" value="2" inputmode="numeric" oninput="calcU()">`;
  }

  body+=`<div id="uc" style="text-align:center;font-size:20px;font-weight:800;color:var(--green);margin:14px 0;min-height:32px"></div>
    <button class="btn btn-primary" onclick="submitLog('${item.id}')">Log Price</button>
    <div style="text-align:right;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
      <button onclick="if(confirm('Remove ${esc(item.name)} from your list?')){deleteItem('${item.id}');A.modal=null;}" style="background:none;border:none;font-size:12px;color:var(--text-hint);cursor:pointer;padding:4px 0;text-decoration:underline">Remove from list</button>
    </div>`;
  return body;
}

function renderLogBody(item){
  const c=document.getElementById('logbody');
  if(c){c.innerHTML=logBody(item);setTimeout(()=>{const p=document.getElementById('m-p');if(p)p.focus();},0);}
}

function computePrice(){
  const item=A.selectedItem;if(!item)return{price:0};
  const dm=A._dealMode||'plain';
  const raw=parseFloat(document.getElementById('m-p')?.value)||0;
  if(dm==='twofor'){
    const dn=Math.max(2,parseFloat(document.getElementById('m-dealn')?.value)||2);
    return{price:+(raw/dn).toFixed(2)};
  }
  if(dm==='bogo')return{price:+(raw/2).toFixed(2)};
  return{price:+raw.toFixed(2)};
}

function calcU(){
  const item=A.selectedItem;if(!item)return;
  const u=document.getElementById('uc');if(!u)return;
  const {price}=computePrice();
  const ul=priceLabel(item);
  if(price>0){
    const bp=parseFloat(item.buy_price),s=sig(price,bp);
    const light=s==='buy'?'🟢':s==='high'?'🔴':'🟡';
    u.innerHTML=light+' $'+price.toFixed(2)+' per '+ul;
  }else u.textContent='';
}

function submitLog(itemId){
  const {price}=computePrice();
  if(!price||price<=0)return toast('Enter the price');
  addLog(itemId,price);
  A.modal=null;
}

      <textarea class="inp" readonly rows="6" onclick="this.select()" style="resize:none;font-family:monospace;font-size:10px;margin-bottom:14px;color:var(--text-muted)">${txt}</textarea>
      <button class="btn btn-primary" onclick="if(navigator.clipboard){navigator.clipboard.writeText(A._exportText||'').then(()=>toast('Copied to clipboard')).catch(()=>toast('Press and hold the box to copy manually'))}else{toast('Press and hold the box to copy manually')}">Copy to Clipboard</button>
      <button style="display:block;width:100%;margin-top:8px;background:none;border:none;font-size:13px;color:var(--text-hint);cursor:pointer;padding:8px" onclick="A.modal=null;A._exportText=null;render()">Done</button>
    </div></div>`;
  }

  if(A.modal==='importData'){
    return`<div class="modal-overlay" onclick="A.modal=null;render()"><div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-title">Restore From Backup</div>
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:12px">Paste the contents of a backup file below. This replaces everything currently in the app.</div>
      <textarea class="inp" id="m-imp" rows="6" placeholder='{"v":2,...}' style="resize:vertical;font-family:monospace;font-size:11px;margin-bottom:14px"></textarea>
      <button class="btn btn-primary" onclick="importData(document.getElementById('m-imp').value)">Restore</button>
    </div></div>`;
  }
  return'';
}

// ---- Shrinkflation modal helpers ----
let _shrinkUnit='oz';
function setShrinkUnit(u){
  _shrinkUnit=u;
  ['oz','lb','ct'].forEach(x=>{const el=document.getElementById('sk-'+x);if(el)el.classList.toggle('active',x===u);});
}
function saveShrink(itemId){
  const qty=document.getElementById('sk-qty')?.value;
  if(!qty||parseFloat(qty)<=0)return toast('Enter the package size');
  // only attach to the log that was just created — never to an old one
  if(!A._logResult||A._logResult.itemId!==itemId)return toast('Log a price first, then track the size');
  const logs=A.logs[itemId]||[];
  const target=logs.find(l=>l.id===A._logResult.log.id);
  if(!target)return toast('Log a price first, then track the size');
  target.pkgQty=+parseFloat(qty).toFixed(2);
  target.pkgUnit=_shrinkUnit;
  // update the in-memory _logResult so the result screen reflects the new size
  A._logResult.log.pkgQty=target.pkgQty;
  A._logResult.log.pkgUnit=target.pkgUnit;
  save();A.modal='result';render();toast('Package size saved');
}
let _customMode='unit';
function setCustomMode(m){
  _customMode=m;
  const u=document.getElementById('cm-unit'),p=document.getElementById('cm-pkg');
  if(u&&p){u.classList.toggle('active',m==='unit');p.classList.toggle('active',m==='package');}
}
function guessCustom(){
  const name=document.getElementById('m-n')?.value||'';
  const hint=document.getElementById('m-bphint');
  const bpField=document.getElementById('m-bp');
  if(!name.trim()){
    if(hint)hint.textContent='Type a name above and we\'ll suggest a starting target. Always check it — especially for specialty or premium items.';
    return;
  }
  const g=guessItem(name);
  setCustomMode(g.mode);
  // only pre-fill if empty so user edits aren't overwritten
  if(bpField&&!bpField.value)bpField.value=g.bp.toFixed(2);
  if(hint){
    const ul=g.mode==='package'?'package':'lb';
    hint.textContent='Suggested target: $'+g.bp.toFixed(2)+' per '+ul+' based on average prices. Change it if your store runs higher or lower, or if you buy a premium brand.';
  }
}
function submitCustom(){
  const name=document.getElementById('m-n')?.value||'';
  if(!name.trim())return toast('Enter an item name');
  const bp=parseFloat(document.getElementById('m-bp')?.value);
  if(!bp||bp<=0)return toast('Enter a buy price target');
  const mode=_customMode;
  const unit=mode==='package'?'package':'lb';
  const it=addItem(name,unit,bp,mode);
  A.selectedItem=it;A._dealMode='plain';A.modal='logPrice';render();
}

load();render();
